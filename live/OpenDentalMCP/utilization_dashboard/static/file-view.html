<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>File viewer</title>
<style>
:root {
  --bg: #0e1116;
  --panel: #161b22;
  --panel-border: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --accent: #2f81f7;
  --bad: #f85149;
  --good: #2ea043;
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--text);
  font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--panel-border);
  display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
}
header h1 { margin: 0; font-size: 14px; font-weight: 600; font-family: ui-monospace, monospace; word-break: break-all; }
header nav a { color: var(--text-dim); text-decoration: none; font-size: 13px; margin-right: 14px; }
header nav a:hover { color: var(--text); }
header .meta { color: var(--text-dim); font-size: 12px; margin-left: auto; }
header .meta code { background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 3px; font-size: 11px; }
header .badge {
  font-size: 10px; padding: 1px 6px; border-radius: 3px;
  background: rgba(255,255,255,0.06); color: var(--text-dim);
  letter-spacing: 0.04em;
}
main { padding: 0 14px 14px; }
.viewer {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 6px;
  margin-top: 10px;
  overflow: hidden;
}
.viewer .toolbar {
  display: flex; gap: 10px; align-items: center;
  padding: 8px 12px;
  border-bottom: 1px solid var(--panel-border);
  font-size: 11px; color: var(--text-dim);
}
.viewer .toolbar button, .viewer .toolbar a {
  background: transparent;
  border: 1px solid var(--panel-border);
  color: var(--text-dim);
  font: inherit; font-size: 11px;
  padding: 2px 8px; border-radius: 3px;
  cursor: pointer; text-decoration: none;
}
.viewer .toolbar button:hover, .viewer .toolbar a:hover {
  color: var(--text); border-color: var(--accent);
}
.viewer pre {
  margin: 0;
  padding: 12px 16px;
  font: 12.5px/1.55 ui-monospace, "SFMono-Regular", Consolas, monospace;
  color: var(--text);
  white-space: pre;
  overflow: auto;
  max-height: calc(100vh - 130px);
}
.viewer pre.with-numbers {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 0 12px;
  padding: 12px 0 12px 0;
}
.viewer pre.with-numbers .ln {
  text-align: right; padding-left: 12px;
  color: var(--text-dim); user-select: none;
  font-variant-numeric: tabular-nums;
  border-right: 1px solid var(--panel-border);
  padding-right: 8px;
}
.viewer pre.with-numbers .src { padding-right: 16px; }
.error {
  margin-top: 14px;
  padding: 12px 16px;
  border-left: 3px solid var(--bad);
  background: var(--panel);
  border-radius: 0 6px 6px 0;
  color: var(--text);
}
.error code { background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 3px; }
</style>
</head>
<body>
<header>
  <h1 id="title">…</h1>
  <span class="badge" id="badge"></span>
  <nav>
    <a href="/utilization/projects/">← back to projects</a>
  </nav>
  <span class="meta" id="meta"></span>
</header>

<main>
  <div class="viewer" id="viewer" style="display:none;">
    <div class="toolbar">
      <button id="toggle-numbers" type="button" title="Toggle line numbers">line numbers</button>
      <button id="copy-btn" type="button" title="Copy file content to clipboard">copy</button>
      <a id="open-raw" href="#" title="Raw view, no chrome">raw</a>
      <span id="size-info" style="margin-left:auto;"></span>
    </div>
    <pre id="content"></pre>
  </div>
  <div class="error" id="error" style="display:none;"></div>
</main>

<script>
function escapeStr(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function fmtBytes(n) {
  if (n == null) return '';
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
  return (n / 1024 / 1024).toFixed(1) + ' MB';
}

function fmtMtime(epochSecs) {
  if (epochSecs == null) return '';
  const d = new Date(epochSecs * 1000);
  if (isNaN(d)) return '';
  return d.toLocaleString();
}

function renderWithLineNumbers(content) {
  const lines = content.split('\n');
  const lnHtml = lines.map((_, i) => `<span class="ln">${i + 1}</span>`).join('\n');
  const srcHtml = lines.map(l => `<span class="src">${escapeStr(l)}</span>`).join('\n');
  return lnHtml + '\n' + srcHtml;
}

async function load() {
  const params = new URLSearchParams(window.location.search);
  const path = params.get('path') || '';
  const titleEl = document.getElementById('title');
  const badgeEl = document.getElementById('badge');
  const metaEl = document.getElementById('meta');
  const errorEl = document.getElementById('error');
  const viewerEl = document.getElementById('viewer');
  const contentEl = document.getElementById('content');
  const sizeInfoEl = document.getElementById('size-info');
  const openRawEl = document.getElementById('open-raw');

  if (!path) {
    titleEl.textContent = '(no path)';
    errorEl.style.display = 'block';
    errorEl.innerHTML = 'Missing <code>?path=</code> query param. Open a file by clicking an inline code span on the projects page.';
    return;
  }
  titleEl.textContent = path;

  try {
    const r = await fetch(
      '/utilization/api/file-view?path=' + encodeURIComponent(path),
      { cache: 'no-store' }
    );
    const d = await r.json();
    if (!r.ok || d.error) {
      errorEl.style.display = 'block';
      errorEl.innerHTML = `<strong style="color:var(--bad)">Error ${r.status}:</strong> ${escapeStr(d.error || 'unknown')}`;
      return;
    }
    badgeEl.textContent = d.ext.replace('.', '').toUpperCase();
    sizeInfoEl.textContent = fmtBytes(d.size) + ' · modified ' + fmtMtime(d.mtime);
    metaEl.innerHTML = `<code>${escapeStr(d.abs_path)}</code>`;
    openRawEl.href = '/utilization/api/file-view?path=' + encodeURIComponent(path);
    openRawEl.target = '_blank';
    document.title = path + ' — file viewer';

    // Render with line numbers by default for code-ish files; plain pre for .md.
    const codeExts = ['.py', '.js', '.css', '.html', '.sh', '.ps1', '.sql', '.json', '.yaml', '.yml', '.toml', '.cfg', '.ini'];
    const wantNumbers = codeExts.includes(d.ext);
    contentEl.classList.toggle('with-numbers', wantNumbers);
    if (wantNumbers) {
      contentEl.innerHTML = renderWithLineNumbers(d.content);
    } else {
      contentEl.textContent = d.content;
    }
    viewerEl.style.display = 'block';
  } catch (e) {
    errorEl.style.display = 'block';
    errorEl.innerHTML = `<strong style="color:var(--bad)">Fetch error:</strong> ${escapeStr(e.message || e)}`;
  }
}

document.getElementById('toggle-numbers').addEventListener('click', () => {
  const c = document.getElementById('content');
  const want = !c.classList.contains('with-numbers');
  c.classList.toggle('with-numbers', want);
  // Re-render: easiest to reload (preserves param)
  if (want && !c.querySelector('.ln')) {
    const txt = c.textContent;
    c.innerHTML = renderWithLineNumbers(txt);
  } else if (!want) {
    const srcSpans = c.querySelectorAll('.src');
    if (srcSpans.length) {
      c.textContent = [...srcSpans].map(s => s.textContent).join('\n');
    }
  }
});

document.getElementById('copy-btn').addEventListener('click', async () => {
  const c = document.getElementById('content');
  const srcSpans = c.querySelectorAll('.src');
  const txt = srcSpans.length
    ? [...srcSpans].map(s => s.textContent).join('\n')
    : c.textContent;
  try {
    await navigator.clipboard.writeText(txt);
    const btn = document.getElementById('copy-btn');
    const orig = btn.textContent;
    btn.textContent = '✓ copied';
    setTimeout(() => { btn.textContent = orig; }, 1500);
  } catch (e) {
    alert('Copy failed: ' + (e.message || e));
  }
});

load();
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Project Detail · Utilization</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* Surfaces (cool, perceptually-balanced via oklch) */
  --bg-0: oklch(17% 0.012 256);
  --bg-1: oklch(20% 0.013 256);
  --bg-2: oklch(23% 0.014 256);
  --bg-3: oklch(26% 0.015 256);
  --bg-code: oklch(15% 0.012 256);

  /* Text */
  --fg-0: oklch(96% 0.005 256);
  --fg-1: oklch(82% 0.010 256);
  --fg-2: oklch(64% 0.012 256);
  --fg-3: oklch(48% 0.012 256);

  /* Hairlines */
  --line-1: oklch(30% 0.013 256);
  --line-2: oklch(35% 0.014 256);

  /* Accents */
  --accent: oklch(67% 0.165 254);
  --accent-bg: oklch(40% 0.110 254 / 0.18);
  --accent-line: oklch(55% 0.150 254 / 0.45);

  --warn: oklch(78% 0.135 78);
  --warn-bg: oklch(50% 0.110 78 / 0.18);
  --warn-line: oklch(60% 0.130 78 / 0.50);

  --good: oklch(70% 0.155 145);
  --good-bg: oklch(45% 0.110 145 / 0.18);
  --good-line: oklch(55% 0.130 145 / 0.45);

  --bad: oklch(68% 0.205 25);
  --bad-bg: oklch(45% 0.140 25 / 0.20);
  --bad-line: oklch(58% 0.180 25 / 0.50);

  --shadow-sm: 0 1px 0 oklch(100% 0 0 / 0.03), 0 1px 2px oklch(0% 0 0 / 0.4);

  --radius: 8px;
  --radius-sm: 6px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg-0);
  color: var(--fg-1);
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: 'cv11', 'ss01', 'ss03';
  font-variant-numeric: tabular-nums;
  min-height: 100vh;
}
::selection { background: var(--accent-bg); color: var(--fg-0); }

.mono { font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Consolas, monospace; }
.label-xs {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-3);
}

/* App bar */
.appbar {
  position: sticky; top: 0; z-index: 10;
  height: 48px;
  background: oklch(17% 0.012 256 / 0.85);
  backdrop-filter: saturate(140%) blur(8px);
  -webkit-backdrop-filter: saturate(140%) blur(8px);
  border-bottom: 1px solid var(--line-1);
  display: flex; align-items: center;
  padding: 0 24px;
  gap: 24px;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  font-weight: 600; color: var(--fg-0);
  letter-spacing: -0.01em;
}
.brand-mark {
  width: 18px; height: 18px;
  border-radius: 5px;
  background:
    conic-gradient(from 210deg at 50% 50%,
      oklch(67% 0.165 254),
      oklch(70% 0.155 145),
      oklch(78% 0.135 78),
      oklch(68% 0.205 25),
      oklch(67% 0.165 254));
  box-shadow: inset 0 0 0 1px oklch(0% 0 0 / 0.4);
}
.crumbs {
  display: flex; align-items: center; gap: 8px;
  color: var(--fg-2);
  font-size: 13px;
}
.crumbs .sep { color: var(--fg-3); }
.crumbs a { color: var(--fg-2); text-decoration: none; }
.crumbs a:hover { color: var(--fg-0); }
.crumbs .current { color: var(--fg-0); font-weight: 500; }

.tabs { display: flex; gap: 2px; margin-left: auto; }
.tab {
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 13px;
  color: var(--fg-2);
  text-decoration: none;
  cursor: pointer;
  user-select: none;
}
.tab:hover { color: var(--fg-0); background: var(--bg-2); }
.tab.active { color: var(--fg-0); background: var(--bg-2); }

.updated {
  color: var(--fg-3);
  font-size: 12px;
  display: flex; align-items: center; gap: 6px;
}
.updated .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--good);
  box-shadow: 0 0 0 3px var(--good-bg);
}

/* Layout */
.page {
  max-width: 1440px;
  margin: 0 auto;
  padding: 32px 32px 80px;
}

/* Hero */
.hero {
  display: flex; align-items: flex-start; gap: 20px;
  padding: 4px 0 28px;
  border-bottom: 1px solid var(--line-1);
  margin-bottom: 28px;
}
.status-orb {
  margin-top: 12px;
  position: relative;
  width: 14px; height: 14px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-orb.red    { background: var(--bad);  box-shadow: 0 0 0 4px var(--bad-bg),  0 0 16px oklch(68% 0.205 25  / 0.45); }
.status-orb.yellow { background: var(--warn); box-shadow: 0 0 0 4px var(--warn-bg), 0 0 16px oklch(78% 0.135 78  / 0.45); }
.status-orb.green  { background: var(--good); box-shadow: 0 0 0 4px var(--good-bg), 0 0 16px oklch(70% 0.155 145 / 0.45); }
.status-orb.unknown{ background: var(--fg-3); box-shadow: 0 0 0 4px var(--bg-2); }
.status-orb::after {
  content: ""; position: absolute; inset: -3px;
  border-radius: 50%;
  border: 1px solid var(--line-2);
  animation: pulse 2.4s ease-out infinite;
}
.status-orb.red::after    { border-color: var(--bad-line); }
.status-orb.yellow::after { border-color: var(--warn-line); }
.status-orb.green::after  { border-color: var(--good-line); }
@keyframes pulse {
  0% { transform: scale(1); opacity: 0.9; }
  100% { transform: scale(2.2); opacity: 0; }
}

.hero-title-wrap { flex: 1; min-width: 0; }
.hero-tag-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.hero-title {
  font-size: 28px;
  font-weight: 600;
  color: var(--fg-0);
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin: 0 0 10px;
}
.hero-reason {
  color: var(--fg-2);
  font-size: 14px;
  display: inline-flex; align-items: center; gap: 8px;
  flex-wrap: wrap;
}
.hero-reason .em-bad { color: var(--bad); font-family: 'JetBrains Mono', ui-monospace, monospace; }
.hero-reason .em-warn { color: var(--warn); font-family: 'JetBrains Mono', ui-monospace, monospace; }

.tag {
  display: inline-flex; align-items: center; gap: 6px;
  height: 22px; padding: 0 8px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.04em;
  border-radius: 4px;
  background: var(--bg-2);
  color: var(--fg-1);
  border: 1px solid var(--line-1);
}
.tag.domain { color: var(--accent); border-color: var(--accent-line); background: var(--accent-bg); }
.tag.phase  { color: var(--good);   border-color: var(--good-line);   background: var(--good-bg); }
.tag.bad    { color: var(--bad);    border-color: var(--bad-line);    background: var(--bad-bg); }
.tag.warn   { color: var(--warn);   border-color: var(--warn-line);   background: var(--warn-bg); }
.tag .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

.hero-actions { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  height: 30px; padding: 0 12px;
  font-size: 13px; font-weight: 500;
  border-radius: 6px;
  border: 1px solid var(--line-1);
  background: var(--bg-2);
  color: var(--fg-1);
  cursor: pointer;
  transition: background 80ms, border-color 80ms, color 80ms;
  white-space: nowrap;
  font-family: inherit;
}
.btn:hover { background: var(--bg-3); border-color: var(--line-2); color: var(--fg-0); }
.btn:disabled { opacity: 0.5; cursor: wait; }
.btn.ghost { background: transparent; }
.btn.ghost:hover { background: var(--bg-2); }
.btn.primary { background: var(--accent); color: white; border-color: transparent; }
.btn.primary:hover { background: oklch(72% 0.165 254); color: white; }

/* Grid */
.grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 380px;
  gap: 28px;
  align-items: flex-start;
}
@media (max-width: 1100px) {
  .grid { grid-template-columns: 1fr; }
}

/* Panels */
.panel {
  background: var(--bg-1);
  border: 1px solid var(--line-1);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}
.panel + .panel { margin-top: 20px; }
.panel-head {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--line-1);
}
.panel-head .label-xs { color: var(--fg-2); }
.panel-head .count {
  margin-left: auto;
  color: var(--fg-3); font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
}
.panel-head .panel-action {
  margin-left: 12px;
  background: transparent; border: 0;
  color: var(--fg-2); font: inherit; font-size: 12px;
  padding: 4px 8px; border-radius: 5px;
  cursor: pointer;
}
.panel-head .panel-action:hover { background: var(--bg-2); color: var(--fg-0); }
.panel-head .panel-action:disabled { opacity: 0.5; cursor: wait; }
.panel-body { padding: 14px 16px; }
.panel-body.flush { padding: 0; }

/* Description card */
.desc {
  color: var(--fg-1);
  font-size: 15px;
  line-height: 1.6;
  margin: 0;
  white-space: pre-wrap;
}
.desc code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  background: var(--bg-2);
  border: 1px solid var(--line-1);
  border-radius: 4px;
  padding: 1px 5px;
  color: var(--fg-0);
}

/* Health signals */
.kv-list { display: flex; flex-direction: column; }
.kv-row {
  display: grid;
  grid-template-columns: 110px 1fr;
  gap: 12px;
  padding: 10px 16px;
  border-top: 1px solid var(--line-1);
  align-items: baseline;
}
.kv-row:first-child { border-top: none; }
.kv-row .k {
  color: var(--fg-3);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.kv-row .v {
  color: var(--fg-0);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  word-break: break-word;
  line-height: 1.45;
}
.kv-row .v .sub { color: var(--fg-3); font-weight: 400; }
.kv-row.bad { background: linear-gradient(90deg, var(--bad-bg) 0%, transparent 100%); }
.kv-row.bad .v { color: var(--bad); }
.kv-row.bad .v .sub { color: var(--bad); opacity: 0.7; }

.stat-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 0 6px; height: 18px;
  border-radius: 3px;
  font-size: 11px;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  border: 1px solid var(--line-1);
  background: var(--bg-2);
  color: var(--fg-2);
}
.stat-pill.good { color: var(--good); border-color: var(--good-line); background: var(--good-bg); }
.stat-pill.bad  { color: var(--bad);  border-color: var(--bad-line);  background: var(--bad-bg); }
.stat-pill.warn { color: var(--warn); border-color: var(--warn-line); background: var(--warn-bg); }
.stat-pill .ddot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

/* Next-steps queue */
.queue { display: flex; flex-direction: column; }
.row {
  border-top: 1px solid var(--line-1);
}
.row:first-child { border-top: none; }
.row-head {
  display: grid;
  grid-template-columns: 28px minmax(0, 1fr) auto;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  cursor: pointer;
  transition: background 80ms;
}
.row-head:hover { background: var(--bg-2); }
.row.expanded > .row-head { background: var(--bg-2); }

.row-icon {
  width: 24px; height: 24px;
  display: grid; place-items: center;
  border-radius: 50%;
}
.row-icon .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--fg-3);
  box-shadow: 0 0 0 3px var(--bg-1);
}
.row.applied .row-icon .dot { background: var(--good); box-shadow: 0 0 0 3px var(--good-bg); }
.row.pending .row-icon .dot { background: var(--warn); box-shadow: 0 0 0 3px var(--warn-bg); }
.row.failed  .row-icon .dot { background: var(--bad);  box-shadow: 0 0 0 3px var(--bad-bg); }
.row.discarded .row-icon .dot { background: var(--fg-3); box-shadow: 0 0 0 3px var(--bg-2); }
.row.running .row-icon .dot {
  background: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-bg);
  animation: blink 1.2s ease-in-out infinite;
}
@keyframes blink { 50% { opacity: 0.35; } }

.row-text {
  color: var(--fg-1);
  font-size: 14px;
  line-height: 1.55;
  min-width: 0;
}
.row-text code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  background: var(--bg-2);
  border: 1px solid var(--line-1);
  border-radius: 4px;
  padding: 1px 5px;
  color: var(--fg-0);
}
.row.expanded .row-text { color: var(--fg-0); }
.row-text strong { font-weight: 600; color: var(--fg-0); }

/* Action split-button */
.actions { display: flex; gap: 6px; align-items: center; }
.actions-wrap { position: relative; }
.action-split {
  display: inline-flex;
  border-radius: 6px;
  background: var(--bg-2);
  border: 1px solid var(--line-1);
  overflow: hidden;
}
.action-split:hover { border-color: var(--line-2); }
.action-split .main {
  height: 28px; padding: 0 12px;
  font-size: 12.5px; font-weight: 500;
  color: var(--fg-1);
  background: transparent;
  border: 0;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  font-family: inherit;
}
.action-split .main:hover { background: var(--bg-3); color: var(--fg-0); }
.action-split .main:disabled { color: var(--fg-3); cursor: wait; }
.action-split .main.has-result { color: var(--good); }
.action-split .chevron {
  width: 26px;
  border: 0; border-left: 1px solid var(--line-1);
  background: transparent;
  color: var(--fg-3);
  cursor: pointer;
  display: grid; place-items: center;
  font-family: inherit;
  font-size: 12px;
}
.action-split .chevron:hover { background: var(--bg-3); color: var(--fg-0); }

.menu {
  position: absolute;
  right: 0; top: calc(100% + 6px);
  min-width: 260px;
  background: var(--bg-2);
  border: 1px solid var(--line-2);
  border-radius: 8px;
  padding: 6px;
  box-shadow: 0 10px 24px oklch(0% 0 0 / 0.4), 0 2px 6px oklch(0% 0 0 / 0.3);
  z-index: 20;
}
.menu-item {
  display: grid; grid-template-columns: 18px 1fr; gap: 10px; align-items: flex-start;
  padding: 8px 8px;
  border-radius: 5px;
  cursor: pointer;
  color: var(--fg-1);
  font-size: 13px;
  background: transparent;
  border: 0;
  text-align: left;
  width: 100%;
  font-family: inherit;
}
.menu-item:hover { background: var(--bg-3); }
.menu-item .glyph {
  width: 18px; height: 18px;
  display: grid; place-items: center;
  color: var(--fg-2);
  margin-top: 2px;
}
.menu-item.danger { color: var(--warn); }
.menu-item.danger .glyph { color: var(--warn); }
.menu-item.danger:hover { background: var(--warn-bg); }
.menu-item .desc-line {
  font-size: 11.5px; color: var(--fg-3); font-weight: 400;
  margin-top: 2px;
}
.menu-item .name { font-weight: 500; color: var(--fg-0); }
.menu-item.danger .name { color: var(--warn); }
.menu-item .lvl { color: var(--fg-3); font-weight: 400; margin-left: 4px; }
.menu-item.danger .lvl { color: var(--warn); opacity: 0.7; }

/* Inline result panel */
.result {
  margin: 0 16px 14px 58px;
  background: var(--bg-2);
  border: 1px solid var(--line-1);
  border-radius: 8px;
  overflow: hidden;
  animation: fade 180ms ease-out;
}
.result-strip {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--line-1);
  flex-wrap: wrap;
}
.result-strip .badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 0 8px; height: 22px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  border-radius: 4px;
  border: 1px solid var(--line-1);
  background: var(--bg-1);
  color: var(--fg-2);
}
.badge.applied   { color: var(--good); border-color: var(--good-line); background: var(--good-bg); }
.badge.pending   { color: var(--warn); border-color: var(--warn-line); background: var(--warn-bg); }
.badge.discarded { color: var(--fg-3); }
.badge.failed    { color: var(--bad);  border-color: var(--bad-line);  background: var(--bad-bg); }
.badge.confidence-high   { color: var(--good); border-color: var(--good-line); background: var(--good-bg); }
.badge.confidence-medium { color: var(--warn); border-color: var(--warn-line); background: var(--warn-bg); }
.badge.confidence-low    { color: var(--fg-3); }

.agent-id {
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
  color: var(--fg-3);
  display: inline-flex; align-items: center; gap: 8px;
  flex-wrap: wrap;
}
.agent-id .ddot { width: 4px; height: 4px; border-radius: 50%; background: var(--fg-3); }

.verify-strip {
  display: flex; align-items: center; gap: 8px;
  margin: 8px 16px 0 58px;
  padding: 6px 10px;
  background: var(--bg-2);
  color: var(--fg-2);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
  font-weight: 500;
  border-radius: 4px;
  border: 1px solid var(--line-1);
  flex-wrap: wrap;
  animation: fade 180ms ease-out;
}
.verify-strip.pass  { background: var(--good-bg); color: var(--good); border-color: var(--good-line); }
.verify-strip.fail  { background: var(--bad-bg);  color: var(--bad);  border-color: var(--bad-line); }
.verify-strip.block { background: var(--warn-bg); color: var(--warn); border-color: var(--warn-line); }
.verify-strip .ddot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.verify-strip .meta { color: var(--fg-3); }
.verify-strip .ver-blocked {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 3px;
  background: var(--warn-bg);
  color: var(--warn);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  border: 1px solid var(--warn-line);
}
.verify-strip .ver-issues {
  flex-basis: 100%;
  margin: 4px 0 0;
  padding-left: 18px;
  color: var(--bad);
  font-size: 11px;
}
.verify-strip .ver-issues li { margin: 2px 0; }

.prose {
  padding: 14px 16px;
  color: var(--fg-1);
  font-size: 13.5px;
  line-height: 1.6;
  max-height: 9.6em; /* ~6 lines */
  overflow: hidden;
  position: relative;
}
.prose.expanded { max-height: none; }
.prose.expanded::after { display: none; }
.prose:not(.expanded)::after {
  content: "";
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 36px;
  background: linear-gradient(to bottom, transparent, var(--bg-2));
  pointer-events: none;
}
.prose code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  background: var(--bg-1);
  border: 1px solid var(--line-1);
  border-radius: 4px;
  padding: 1px 5px;
}
.prose h3, .prose h4 {
  margin: 8px 0 6px; font-size: 13px; font-weight: 600;
  text-transform: none; letter-spacing: 0; color: var(--fg-0);
}
.prose ul { padding-left: 20px; margin: 4px 0 10px; }
.prose li { margin: 3px 0; }
.prose .files-changed {
  display: flex; flex-wrap: wrap; gap: 4px 8px; margin: 6px 0;
  font-size: 11px; color: var(--fg-3);
}
.prose .files-changed code {
  font-size: 11px;
}

.toggle-row {
  display: flex; align-items: center; gap: 4px;
  padding: 8px 14px;
  border-top: 1px solid var(--line-1);
  flex-wrap: wrap;
}
.link-btn {
  background: transparent; border: 0;
  color: var(--fg-2);
  font-size: 12.5px;
  font-family: inherit;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 5px;
  display: inline-flex; align-items: center; gap: 6px;
}
.link-btn:hover { background: var(--bg-3); color: var(--fg-0); }
.link-btn .chev { transition: transform 120ms; display: inline-block; }
.link-btn.open .chev { transform: rotate(90deg); }

.diff {
  border-top: 1px solid var(--line-1);
  background: var(--bg-code);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.55;
  display: none;
}
.diff.open { display: block; }

<header class="appbar">

  </div>

    <a class="tab active" href="/utilization/projects/">Projects</a>
  </div>

<main class="page" id="container">
  <div class="loading-shell">Loading…</div>
</main>

<script>
function escape(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function fmtAge(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return '—';
  const ago = (Date.now() - d.getTime()) / 1000;
  if (ago < 60) return Math.round(ago) + 's ago';
  if (ago < 3600) return Math.round(ago / 60) + 'm ago';
  if (ago < 86400) return Math.round(ago / 3600) + 'h ago';
  return Math.round(ago / 86400) + 'd ago';
}

function statusOrbClass(level) {
  const ok = ['red', 'yellow', 'green'];
  return ok.includes(level) ? level : 'unknown';
}

function tagClassForPhase(phase) {
  // Soft mapping — "deployed", "live" → green; "stage", "pending" → warn; else neutral.
  const p = (phase || '').toLowerCase();
  if (/deploy|live|prod|ship/.test(p)) return 'phase';
  if (/stage|pending|wip|draft/.test(p)) return 'warn';
  return '';
}

// Parse the next-steps markdown into individual bullets so each can have
// its own action group.
function parseBullets(md) {
  if (!md) return [];
  const out = [];
  let buf = '';
  for (const raw of md.split('\n')) {
    const ln = raw.trimEnd();
    const isBulletStart = /^\s*[-*]\s+/.test(ln);
    if (isBulletStart) {
      if (buf.trim()) out.push(buf.trim());
      buf = ln.replace(/^\s*[-*]\s+/, '');
    } else if (ln.trim() === '') {
      if (buf.trim()) { out.push(buf.trim()); buf = ''; }
    } else {
      buf += '\n' + ln;
    }
  }
  if (buf.trim()) out.push(buf.trim());
  return out;
}

// Lightweight markdown for bullet text (bold, code).
function renderInline(s) {
  let out = escape(s);
  out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  out = out.replace(/`([^`]+)`/g, '<code>$1</code>');
  return out.replace(/\n/g, '<br>');
}

// Markdown renderer for proposal/investigation prose.
function renderProse(md) {
  if (!md) return '<em style="color:var(--fg-3)">Empty response.</em>';
  const lines = md.split('\n');
  const out = [];
  let inList = false;
  const flushList = () => { if (inList) { out.push('</ul>'); inList = false; } };
  for (const raw of lines) {
    const ln = raw.trimEnd();
    let m;
    if ((m = ln.match(/^#{1,4}\s+(.+)$/))) {
      flushList();
      const level = (ln.match(/^#+/) || ['#'])[0].length;
      const tag = level <= 2 ? 'h3' : 'h4';
      out.push(`<${tag}>${renderInline(m[1])}</${tag}>`);
    } else if (/^\s*[-*]\s+/.test(ln)) {
      if (!inList) { out.push('<ul>'); inList = true; }
      out.push('<li>' + renderInline(ln.replace(/^\s*[-*]\s+/, '')) + '</li>');
    } else if (ln.trim() === '') {
      flushList();
    } else {
      flushList();
      out.push('<div>' + renderInline(ln) + '</div>');
    }
  }
  flushList();
  return out.join('');
}

function renderDiffBody(diff) {
  if (!diff) return '<em style="color:var(--fg-3); padding: 10px 14px; display:block;">No diff captured.</em>';
  const lines = diff.split('\n').map(ln => {
    if (ln.startsWith('+++') || ln.startsWith('---') || ln.startsWith('diff ') || ln.startsWith('@@')) {
      return `<span class="header">${escape(ln)}</span>`;
    }
    if (ln.startsWith('+')) return `<span class="added">${escape(ln)}</span>`;
    if (ln.startsWith('-')) return `<span class="removed">${escape(ln)}</span>`;
    return `<span>${escape(ln)}</span>`;
  });
  return `<pre>${lines.join('')}</pre>`;
}

function diffStat(diff) {
  if (!diff) return '';
  let add = 0, del = 0;
  for (const ln of diff.split('\n')) {
    if (ln.startsWith('+++') || ln.startsWith('---')) continue;
    if (ln.startsWith('+')) add++;
    else if (ln.startsWith('-')) del++;
  }
  return `+${add} −${del}`;
}

function rowStatusClass(prop) {
  if (!prop) return 'idle';
  const s = (prop.status || '').toLowerCase();
  if (s === 'applied' || s === 'pending' || s === 'failed' || s === 'discarded') return s;
  return 'idle';
}

function renderVerifyStrip(v) {
  if (!v) return '';
  const status = (v.status || 'unknown').toLowerCase();
  const tier = (v.tier || '').toUpperCase();
  const ev = v.evidence || {};
  const issues = ev.issues || [];
  const cls = (status === 'pass' ? 'pass' :
               status === 'fail' ? 'fail' :
               (v.blocked_apply ? 'block' : ''));
  const issuesHtml = issues.length
    ? '<ul class="ver-issues">' +
      issues.slice(0, 8).map(i => '<li>' + escape(i) + '</li>').join('') +
      (issues.length > 8 ? `<li style="color:var(--fg-3)">…and ${issues.length - 8} more</li>` : '') +
      '</ul>'
    : '';
  const blockedTag = v.blocked_apply ? '<span class="ver-blocked">blocked auto-apply</span>' : '';
  return `
    <div class="verify-strip ${cls}">
      <span class="ddot"></span>
      <span style="font-weight:700; letter-spacing:0.04em;">${escape(tier)}</span>
      <span class="meta">·</span>
      <span style="text-transform:uppercase; font-weight:700;">${escape(status.toUpperCase())}</span>
      <span class="meta">·</span>
      <span class="meta">${escape(v.summary || '')}</span>
      ${blockedTag}
      <span class="meta">·</span>
      <span class="meta">${v.latency_ms != null ? Math.round(v.latency_ms) + 'ms' : ''}</span>
      <span class="meta">·</span>
      <span class="meta">${fmtAge(v.ts)}</span>
      ${issuesHtml}
    </div>
  `;
}

function renderResultPanel(prop, h) {
  if (!prop) return '';
  const status = (prop.status || 'pending').toLowerCase();
  const conf = (prop.summary || '').match(/\b(HIGH|MEDIUM|LOW)\b/);
  const confTag = conf
    ? `<span class="badge confidence-${conf[1].toLowerCase()}">${conf[1]} confidence</span>`
    : '';
  const filesHtml = (prop.files_changed && prop.files_changed.length)
    ? '<div class="files-changed">' +
      prop.files_changed.map(f => '<code>' + escape(f) + '</code>').join('') +
      '</div>'
    : '';
  const errorHtml = prop.error
    ? `<div style="color:var(--bad); margin-top:6px; font-size:12px;">${escape(prop.error)}</div>`
    : '';
  const proseHtml = renderProse(prop.summary || '') + filesHtml + errorHtml;
  const diffStatStr = diffStat(prop.diff);
  const diffToggleHtml = prop.diff
    ? `<button class="link-btn" data-toggle="diff" data-bullet-hash="${escape(h)}">
         <span class="chev">›</span>
         <span class="lbl">Show diff</span>
         <span style="color:var(--fg-3)">· ${escape(diffStatStr)}</span>
       </button>`
    : '';
  const expandToggleHtml = `
    <button class="link-btn" data-toggle="prose" data-bullet-hash="${escape(h)}">
      <span class="chev">›</span>
      <span class="lbl">Show more</span>
    </button>`;
  const applyRow = (status === 'pending')
    ? `<div class="apply-row">
         <span class="meta">Awaiting your decision · diff is staged but not committed.</span>
         <span class="spacer"></span>
         <button class="btn ghost discard" data-action="discard" data-bullet-hash="${escape(h)}">Discard</button>
         <button class="btn primary apply" data-action="apply" data-bullet-hash="${escape(h)}">Apply to main</button>
       </div>`
    : (status === 'applied' && !prop.error)
      ? `<div class="apply-row">
           <span class="meta">Auto-applied${prop.commit_sha ? ' · committed as <code style="font-family:JetBrains Mono;monospace;color:var(--fg-1)">' + escape(prop.commit_sha.slice(0,7)) + '</code>' : ''}.</span>
           <span class="spacer"></span>
         </div>`
      : '';
  return `
    <div class="result">
      <div class="result-strip">
        <span class="badge ${status}">${escape(status)}</span>
        ${confTag}
        <span class="agent-id">
          <span>${escape(prop.provider_used || '')}</span>
          <span class="ddot"></span>
          <span style="color:var(--fg-2)">${escape(prop.model_used || '')}</span>
          <span class="ddot"></span>
          <span>${prop.latency_ms != null ? Math.round(prop.latency_ms) + 'ms' : ''}</span>
          <span class="ddot"></span>
          <span>${fmtAge(prop.ts)}</span>
        </span>
      </div>
      <div class="prose" id="prose-${escape(h)}">${proseHtml}</div>
      <div class="toggle-row">
        ${expandToggleHtml}
        ${diffToggleHtml}
      </div>
      <div class="diff" id="diff-${escape(h)}">${renderDiffBody(prop.diff)}</div>
      ${applyRow}
    </div>
  `;
}

function renderInvestigationPanel(inv, h) {
  if (!inv) return '';
  return `
    <div class="result">
      <div class="result-strip">
        <span class="badge" style="color:var(--accent); border-color:var(--accent-line); background:var(--accent-bg);">L1 · INVESTIGATION</span>
        <span class="agent-id">
          <span>${escape(inv.provider_used || '')}</span>
          <span class="ddot"></span>
          <span style="color:var(--fg-2)">${escape(inv.model_used || '')}</span>
          <span class="ddot"></span>
          <span>${fmtAge(inv.ts)}</span>
        </span>
      </div>
      <div class="prose" id="prose-${escape(h)}">${renderProse(inv.content || '')}</div>
      <div class="toggle-row">
        <button class="link-btn" data-toggle="prose" data-bullet-hash="${escape(h)}">
          <span class="chev">›</span><span class="lbl">Show more</span>
        </button>
        <span style="color:var(--fg-3); font-size: 11px;">tools: ${escape((inv.tools_used || []).join(', '))}</span>
      </div>
    </div>
  `;
}

// ---- Action menu ----

let openMenu = null;
function closeMenu() {
  if (openMenu) {
    openMenu.remove();
    openMenu = null;
  }
}
document.addEventListener('mousedown', (e) => {
  if (openMenu && !openMenu.contains(e.target) && !e.target.closest('.action-split .chevron')) {
    closeMenu();
  }
});

function openActionMenu(anchorBtn, h, bulletText) {
  closeMenu();
  const wrap = anchorBtn.closest('.actions-wrap');
  const menu = document.createElement('div');
  menu.className = 'menu';
  menu.innerHTML = `
    <button class="menu-item" data-act="investigate">
      <span class="glyph">🔎</span>
      <div>
        <div class="name">Investigate <span class="lvl">L1</span></div>
        <div class="desc-line">Read-only dig — agent inspects code & logs, returns findings</div>
      </div>
    </button>
    <button class="menu-item" data-act="propose">
      <span class="glyph">⚗</span>
      <div>
        <div class="name">Propose <span class="lvl">L2</span></div>
        <div class="desc-line">Agent drafts a diff — review before applying</div>
      </div>
    </button>
    <button class="menu-item danger" data-act="apply">
      <span class="glyph">⚡</span>
      <div>
        <div class="name">Auto-apply <span class="lvl">L3</span></div>
        <div class="desc-line">Agent applies, runs verifier, opens commit on green</div>
      </div>
    </button>
  `;
  wrap.appendChild(menu);
  openMenu = menu;
  menu.querySelectorAll('.menu-item').forEach(it => {
    it.addEventListener('click', () => {
      const act = it.dataset.act;
      closeMenu();
      if (act === 'investigate') runInvestigate(h, bulletText);
      if (act === 'propose')     runPropose(h, bulletText, 'l2');
      if (act === 'apply')       runPropose(h, bulletText, 'l3');
    });
  });
}

// SHA-1 of a string, hex, first 16 chars — must match the server's hash.
async function bulletHash(text) {
  const bytes = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest('SHA-1', bytes);
  const bin = Array.from(new Uint8Array(hash));
  return bin.map(b => b.toString(16).padStart(2, '0')).join('').slice(0, 16);
}

const projectId = decodeURIComponent(
  (location.pathname.match(/\/projects\/([^/]+)\/?$/) || [])[1] || ''
);

let currentDetail = null;
const bulletTextByHash = new Map();

function findRow(h) {
  return document.querySelector(`.row[data-hash="${h}"]`);
}
function setRowResult(h, html, status) {
  const row = findRow(h);
  if (!row) return;
  row.classList.remove('idle','applied','pending','failed','discarded','running');
  if (status) row.classList.add(status);
  row.classList.add('expanded');
  // Replace any existing result/verify-strip/running placeholder
  row.querySelectorAll('.result, .verify-strip, .bullet-running, .bullet-error').forEach(el => el.remove());
  row.insertAdjacentHTML('beforeend', html);
  bindResultPanelInteractivity(row);
}

function bindResultPanelInteractivity(scope) {
  scope.querySelectorAll('button[data-toggle="prose"]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const h = btn.dataset.bulletHash;
      const prose = document.getElementById('prose-' + h);
      if (!prose) return;
      const open = prose.classList.toggle('expanded');
      btn.classList.toggle('open', open);
      btn.querySelector('.lbl').textContent = open ? 'Show less' : 'Show more';
    });
  });
  scope.querySelectorAll('button[data-toggle="diff"]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const h = btn.dataset.bulletHash;
      const diff = document.getElementById('diff-' + h);
      if (!diff) return;
      const open = diff.classList.toggle('open');
      btn.classList.toggle('open', open);
      btn.querySelector('.lbl').textContent = open ? 'Hide diff' : 'Show diff';
    });
  });
  scope.querySelectorAll('button[data-action="apply"], button[data-action="discard"]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const action = btn.dataset.action;
      const h = btn.dataset.bulletHash;
      btn.disabled = true;
      const orig = btn.textContent;
      btn.textContent = action === 'apply' ? 'Applying…' : 'Discarding…';
      try {
        const res = await fetch(
          `/utilization/api/projects/${encodeURIComponent(projectId)}/proposals/${encodeURIComponent(h)}/${action}`,
          { method: 'POST' }
        );
        const d = await res.json();
        if (!res.ok || d.error) {
          alert((d.error || 'failed') + '');
          btn.disabled = false; btn.textContent = orig;
          return;
        }
        loadDetail();
      } catch (err) {
        alert(err.message || err);
        btn.disabled = false; btn.textContent = orig;
      }
    });
  });
}

async function runInvestigate(h, bulletText) {
  const row = findRow(h);
  if (!row) return;
  row.classList.add('expanded', 'running');
  row.querySelectorAll('.result, .verify-strip, .bullet-running, .bullet-error').forEach(el => el.remove());
  row.insertAdjacentHTML(
    'beforeend',
    `<div class="bullet-running"><span class="pulse"></span><span>Agent investigating (read-only: Read / Grep / Glob). 30–90s typical.</span></div>`
  );
  try {
    const res = await fetch(
      `/utilization/api/projects/${encodeURIComponent(projectId)}/investigate`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bullet_text: bulletText }),
      }
    );
    const d = await res.json();
    if (!res.ok || d.error) {
      row.querySelector('.bullet-running')?.remove();
      row.classList.remove('running');
      row.insertAdjacentHTML('beforeend', `<div class="bullet-error">${escape(d.error || 'failed')}</div>`);
      return;
    }
    row.classList.remove('running');
    setRowResult(h, renderInvestigationPanel({
      content: d.content,
      provider_used: d.provider,
      model_used: d.model,
      ts: d.ts,
      tools_used: d.tools_used,
    }, h), null);
  } catch (e) {
    row.querySelector('.bullet-running')?.remove();
    row.classList.remove('running');
    row.insertAdjacentHTML('beforeend', `<div class="bullet-error">${escape(e.message || e)}</div>`);
  }
}

async function runPropose(h, bulletText, mode) {
  if (mode === 'l3') {
    const ok = window.confirm(
      'AUTO-APPLY (L3): the agent will run in an isolated git worktree, ' +
      'edit files in this project, and AUTO-MERGE the result into main if it ' +
      'reports HIGH confidence. Lower-confidence proposals stay pending for review.\n\n' +
      'Continue?'
    );
    if (!ok) return;
  }
  const row = findRow(h);
  if (!row) return;
  row.classList.add('expanded', 'running');
  row.querySelectorAll('.result, .verify-strip, .bullet-running, .bullet-error').forEach(el => el.remove());
  row.insertAdjacentHTML(
    'beforeend',
    `<div class="bullet-running"><span class="pulse"></span><span>Agent ${mode === 'l3' ? 'editing + auto-applying' : 'drafting a change'} in an isolated worktree. 1–3 min typical.</span></div>`
  );
  try {
    const res = await fetch(
      `/utilization/api/projects/${encodeURIComponent(projectId)}/propose`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bullet_text: bulletText, mode }),
      }
    );
    const d = await res.json();
    if (!res.ok || d.error) {
      row.querySelector('.bullet-running')?.remove();
      row.classList.remove('running');
      row.insertAdjacentHTML('beforeend', `<div class="bullet-error">${escape(d.error || 'failed')}</div>`);
      return;
    }
    row.classList.remove('running');
    const prop = {
      status: d.status,
      summary: d.summary,
      files_changed: d.files_changed,
      diff: d.diff,
      mode: d.mode,
      ts: d.ts,
      provider_used: d.provider,
      model_used: d.model,
      latency_ms: d.latency_ms,
      commit_sha: d.commit_sha,
      error: d.apply_message && !d.auto_applied ? d.apply_message : '',
    };
    setRowResult(h, renderResultPanel(prop, h), (prop.status || '').toLowerCase());
  } catch (e) {
    row.querySelector('.bullet-running')?.remove();
    row.classList.remove('running');
    row.insertAdjacentHTML('beforeend', `<div class="bullet-error">${escape(e.message || e)}</div>`);
  }
}

async function loadDetail() {
  const c = document.getElementById('container');
  try {
    const r = await fetch(
      `/utilization/api/projects/${encodeURIComponent(projectId)}/detail`,
      { cache: 'no-store' }
    );
    if (!r.ok) throw new Error('detail ' + r.status);
    const d = await r.json();
    if (d.error) throw new Error(d.error);

    currentDetail = d;
    const status = d.status || {};
    const health = status.health || {};
    const ns = d.next_steps;
    const investigations = d.investigations || {};
    const proposals = d.proposals || {};
    const verifications = d.verifications || {};

    document.title = (status.name || 'Project') + ' · Utilization';
    const updatedText = document.getElementById('updated-text');
    if (updatedText) updatedText.textContent = 'Synced ' + new Date().toLocaleTimeString();

    const crumbs = document.getElementById('crumbs');
    if (crumbs) {
      crumbs.innerHTML =
        `<a href="/utilization/projects/">All projects</a>` +
        `<span class="sep">/</span>` +
        (status.domain ? `<a href="#">${escape(status.domain)}</a><span class="sep">/</span>` : '') +
        `<span class="current">${escape(status.name || 'Project')}</span>`;
    }

    const orbClass = statusOrbClass(status.overall);
    const phaseTag = status.phase
      ? `<span class="tag ${tagClassForPhase(status.phase)}"><span class="dot"></span>${escape(status.phase)}</span>`
      : '';
    const domainTag = status.domain
      ? `<span class="tag domain">${escape(status.domain)}</span>`
      : '';
    const reasonClass = (orbClass === 'red') ? 'em-bad' : (orbClass === 'yellow' ? 'em-warn' : '');

    // Health row red highlight if log is stale
    const logStale = !!health.log_stale;
    const logFreshnessVal = health.log_age_hours != null
      ? `${health.log_age_hours.toFixed(1)}h ${logStale ? `<span class="stat-pill bad">stale &gt; ${health.log_stale_after_hours}h</span>` : `<span class="stat-pill good">fresh</span>`}`
      : '—';

    // Bullets
    const bullets = parseBullets(ns && ns.content);
    bulletTextByHash.clear();
    let bulletAppliedCount = 0;

    const rowsHtml = bullets.length
      ? (await Promise.all(bullets.map(async (b) => {
          const h = await bulletHash(b);
          bulletTextByHash.set(h, b);
          const inv = investigations[h];
          const prop = proposals[h];
          const ver = verifications[h];
          if ((prop?.status || '').toLowerCase() === 'applied') bulletAppliedCount++;
          const status = rowStatusClass(prop);
          const initialResult = prop ? renderResultPanel(prop, h)
                                     : (inv ? renderInvestigationPanel(inv, h) : '');
          const verHtml = ver ? renderVerifyStrip(ver) : '';
          const expanded = (prop || inv) ? 'expanded' : '';
          const hasInv = !!inv;
          return `
            <div class="row ${status} ${expanded}" data-hash="${h}">
              <div class="row-head" data-bullet-hash="${h}">
                <div class="row-icon"><span class="dot"></span></div>
                <div class="row-text">${renderInline(b)}</div>
                <div class="actions" onclick="event.stopPropagation()">
                  <div class="actions-wrap">
                    <div class="action-split">
                      <button class="main ${hasInv ? 'has-result' : ''}"
                              data-action="investigate"
                              data-bullet-hash="${h}">
                        <span>🔎</span>
                        <span>${hasInv ? '↻ Investigate' : 'Investigate'}</span>
                      </button>
                      <button class="chevron"
                              data-action="menu"
                              data-bullet-hash="${h}"
                              aria-label="More actions">▾</button>
                    </div>
                  </div>
                </div>
              </div>
              ${verHtml}
              ${initialResult}
            </div>`;
        }))).join('')
      : '<div class="queue-empty">No next-steps generated yet. Click <strong>Regenerate</strong>.</div>';

    const queueCountText = bullets.length
      ? `${bulletAppliedCount}/${bullets.length} done${ns && ns.ts ? ' · regenerated ' + fmtAge(ns.ts) : ''}`
      : '';

    c.innerHTML = `
      <section class="hero">
        <span class="status-orb ${orbClass}" title="${escape(orbClass)}"></span>
        <div class="hero-title-wrap">
          <div class="hero-tag-row">
            ${domainTag}
            ${phaseTag}
            ${logStale ? '<span class="tag bad">stale logs</span>' : ''}
          </div>
          <h1 class="hero-title">${escape(status.name || 'Project')}</h1>
          <div class="hero-reason">
            ${status.overall_reason
                ? `<span class="${reasonClass}">${escape(status.overall_reason)}</span>`
                : `<span style="color:var(--fg-3)">No issues detected.</span>`}
          </div>
        </div>
        <div class="hero-actions">
          <button class="btn ghost" id="btn-refresh">↻ Refresh</button>
          <button class="btn primary" id="btn-regen">⚡ Regenerate next steps</button>
        </div>
      </section>

      <div class="grid">
        <div>
          <section class="panel">
            <div class="panel-head">
              <span class="label-xs">Description</span>
              <span class="count">${escape(status.repo_path || '')}</span>
            </div>
            <div class="panel-body">
              <p class="desc">${escape(status.description || '—')}</p>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <span class="label-xs">Next steps queue</span>
              <span class="count">${escape(queueCountText)}</span>
            </div>
            <div class="queue panel-body flush">
              ${rowsHtml}
            </div>
            ${ns ? `<div class="ns-meta">generated ${fmtAge(ns.ts)} via ${escape(ns.provider_used || '')} (${escape(ns.model_used || '')})</div>` : ''}
          </section>
        </div>

        <aside>
          <section class="panel">
            <div class="panel-head">
              <span class="label-xs">Health signals</span>
              <span class="count">5 checks</span>
            </div>
            <div class="kv-list panel-body flush">
              <div class="kv-row">
                <div class="k">Service</div>
                <div class="v">
                  ${escape(health.service || '—')}
                  ${health.service_status
                      ? `<span class="stat-pill ${/running/i.test(health.service_status) ? 'good' : 'warn'}"><span class="ddot"></span>${escape(health.service_status)}</span>`
                      : ''}
                </div>
              </div>
              <div class="kv-row">
                <div class="k">Last commit</div>
                <div class="v">
                  ${health.last_commit_age_days != null ? health.last_commit_age_days.toFixed(1) + 'd' : '—'}
                  ${health.last_commit_subject ? `<span class="sub"> · </span><br><span class="sub">${escape(health.last_commit_subject)}</span>` : ''}
                </div>
              </div>
              <div class="kv-row ${logStale ? 'bad' : ''}">
                <div class="k">Log freshness</div>
                <div class="v">${logFreshnessVal}</div>
              </div>
              <div class="kv-row">
                <div class="k">Log path</div>
                <div class="v">${escape(health.log_path || '—')}</div>
              </div>
              <div class="kv-row">
                <div class="k">Repo path</div>
                <div class="v">${escape(status.repo_path || '—')}</div>
              </div>
            </div>
          </section>

          ${Object.keys(verifications).length ? renderVerificationsPanel(verifications) : ''}
        </aside>
      </div>
    `;

    // Wire up row interactions
    document.querySelectorAll('.row-head').forEach(head => {
      head.addEventListener('click', (e) => {
        // Don't toggle if user clicked a button in the actions column
        if (e.target.closest('.actions')) return;
        const row = head.closest('.row');
        row.classList.toggle('expanded');
      });
    });

    document.querySelectorAll('button[data-action="investigate"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const h = btn.dataset.bulletHash;
        const text = bulletTextByHash.get(h);
        if (text) runInvestigate(h, text);
      });
    });
    document.querySelectorAll('button[data-action="menu"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const h = btn.dataset.bulletHash;
        const text = bulletTextByHash.get(h);
        if (openMenu && openMenu.parentElement === btn.closest('.actions-wrap')) {
          closeMenu();
        } else if (text) {
          openActionMenu(btn, h, text);
        }
      });
    });

    // Wire up existing result panels (proposals already on page)
    document.querySelectorAll('.row .result').forEach(panel => {
      bindResultPanelInteractivity(panel);
    });

    // Hero actions
    const refreshBtn = document.getElementById('btn-refresh');
    if (refreshBtn) refreshBtn.addEventListener('click', () => loadDetail());

    const regenBtn = document.getElementById('btn-regen');
    if (regenBtn) {
      regenBtn.addEventListener('click', async () => {
        regenBtn.disabled = true;
        const orig = regenBtn.innerHTML;
        regenBtn.innerHTML = '⚡ Generating…';
        try {
          const r = await fetch(
            `/utilization/api/projects/${encodeURIComponent(projectId)}/refresh-next-steps`,
            { method: 'POST' }
          );
          if (r.ok) await loadDetail();
        } finally {
          regenBtn.disabled = false;
          regenBtn.innerHTML = orig;
        }
      });
    }
  } catch (e) {
    c.innerHTML = `<div class="fail-shell">Failed to load: ${escape(e.message || e)}</div>`;
  }
}

function renderVerificationsPanel(verifications) {
  const rows = Object.entries(verifications).map(([h, v]) => {
    const status = (v.status || 'unknown').toLowerCase();
    const tier = (v.tier || '').toUpperCase();
    const cls = status === 'pass' ? 'good' : status === 'fail' ? 'bad' : 'warn';
    return `
      <div class="kv-row" style="grid-template-columns: 1fr auto; align-items:center;">
        <div>
          <div style="color:var(--fg-0); font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500;">${escape(tier)}</div>
          <div style="color:var(--fg-3); font-size: 11px; margin-top: 2px;">${escape(v.summary || '')}</div>
        </div>
        <div style="display:flex; align-items:center; gap:8px;">
          <span style="color:var(--fg-3); font-size: 11px; font-family: 'JetBrains Mono', monospace;">
            ${v.latency_ms != null ? Math.round(v.latency_ms) + 'ms · ' : ''}${fmtAge(v.ts)}
          </span>
          <span class="stat-pill ${cls}">${escape(status.toUpperCase())}</span>
        </div>
      </div>
    `;
  }).join('');
  const passCount = Object.values(verifications).filter(v => (v.status || '').toLowerCase() === 'pass').length;
  const total = Object.keys(verifications).length;
  return `
    <section class="panel">
      <div class="panel-head">
        <span class="label-xs">Verifications</span>
        <span class="count">${passCount} / ${total} pass</span>
      </div>
      <div class="kv-list panel-body flush">
        ${rows}
      </div>
    </section>
  `;
}

loadDetail();
</script>
</body>
</html>

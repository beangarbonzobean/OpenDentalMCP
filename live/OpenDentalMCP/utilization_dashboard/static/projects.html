<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* Surfaces (cool, perceptually-balanced via oklch) */
  --bg-0: oklch(17% 0.012 256);
  --bg-1: oklch(20% 0.013 256);
  --bg-2: oklch(23% 0.014 256);
  --bg-3: oklch(26% 0.015 256);
  --bg-code: oklch(15% 0.012 256);

  /* Text */
  --fg-0: oklch(96% 0.005 256);
  --fg-1: oklch(82% 0.010 256);
  --fg-2: oklch(64% 0.012 256);
  --fg-3: oklch(48% 0.012 256);

  /* Hairlines */
  --line-1: oklch(30% 0.013 256);
  --line-2: oklch(35% 0.014 256);

  /* Accents */
  --accent: oklch(67% 0.165 254);
  --accent-bg: oklch(40% 0.110 254 / 0.18);
  --accent-line: oklch(55% 0.150 254 / 0.45);

  --warn: oklch(78% 0.135 78);
  --warn-bg: oklch(50% 0.110 78 / 0.18);
  --warn-line: oklch(60% 0.130 78 / 0.50);

  --good: oklch(70% 0.155 145);
  --good-bg: oklch(45% 0.110 145 / 0.18);
  --good-line: oklch(55% 0.130 145 / 0.45);

  --bad: oklch(68% 0.205 25);
  --bad-bg: oklch(45% 0.140 25 / 0.20);
  --bad-line: oklch(58% 0.180 25 / 0.50);

  --shadow-sm: 0 1px 0 oklch(100% 0 0 / 0.03), 0 1px 2px oklch(0% 0 0 / 0.4);

  --radius: 8px;
  --radius-sm: 6px;

  /* Legacy aliases used throughout this file */
  --bg: var(--bg-0);
  --panel: var(--bg-1);
  --panel-border: var(--line-1);
  --text: var(--fg-1);
  --text-dim: var(--fg-3);
  --neutral: var(--fg-3);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg-0);
  color: var(--fg-1);
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: 'cv11', 'ss01', 'ss03';
  font-variant-numeric: tabular-nums;
  min-height: 100vh;
}
::selection { background: var(--accent-bg); color: var(--fg-0); }

.mono { font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Consolas, monospace; }
.label-xs {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-3);
}

/* App bar */
.appbar {
  position: sticky; top: 0; z-index: 10;
  height: 48px;
  background: oklch(17% 0.012 256 / 0.85);
  backdrop-filter: saturate(140%) blur(8px);
  -webkit-backdrop-filter: saturate(140%) blur(8px);
  border-bottom: 1px solid var(--line-1);
  display: flex; align-items: center;
  padding: 0 24px;
  gap: 24px;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  font-weight: 600; color: var(--fg-0);
  letter-spacing: -0.01em;
}
.brand-mark {
  width: 18px; height: 18px;
  border-radius: 5px;
  background:
    conic-gradient(from 210deg at 50% 50%,
      oklch(67% 0.165 254),
      oklch(70% 0.155 145),
      oklch(78% 0.135 78),
      oklch(68% 0.205 25),
      oklch(67% 0.165 254));
  box-shadow: inset 0 0 0 1px oklch(0% 0 0 / 0.4);
}
.crumbs {
  display: flex; align-items: center; gap: 8px;
  color: var(--fg-2);
  font-size: 13px;
}
.crumbs .sep { color: var(--fg-3); }
.crumbs a { color: var(--fg-2); text-decoration: none; }
.crumbs a:hover { color: var(--fg-0); }
.crumbs .current { color: var(--fg-0); font-weight: 500; }

.tabs { display: flex; gap: 2px; margin-left: auto; }
.tab {
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 13px;
  color: var(--fg-2);
  text-decoration: none;
  cursor: pointer;
  user-select: none;
}
.tab:hover { color: var(--fg-0); background: var(--bg-2); }
.tab.active { color: var(--fg-0); background: var(--bg-2); }

.updated {
  color: var(--fg-3);
  font-size: 12px;
  display: flex; align-items: center; gap: 6px;
}
.updated .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--good);
  box-shadow: 0 0 0 3px var(--good-bg);
}

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  height: 30px; padding: 0 12px;
  font-size: 13px; font-weight: 500;
  border-radius: 6px;
  border: 1px solid var(--line-1);
  background: var(--bg-2);
  color: var(--fg-1);
  cursor: pointer;
  transition: background 80ms, border-color 80ms, color 80ms;
  white-space: nowrap;
  font-family: inherit;
}
.btn:hover { background: var(--bg-3); border-color: var(--line-2); color: var(--fg-0); }
.btn:disabled { opacity: 0.5; cursor: wait; }
.btn.ghost { background: transparent; }
.btn.ghost:hover { background: var(--bg-2); }
.btn.primary { background: var(--accent); color: white; border-color: transparent; }
.btn.primary:hover { background: oklch(72% 0.165 254); color: white; }

.page {
  max-width: 1440px;
  margin: 0 auto;
  padding: 24px 32px 80px;
}

.domain {
  margin: 28px 0 10px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-3);
}
.manager-brief {
  margin: 0 0 20px;
  background: var(--bg-1);
  border: 1px solid var(--line-1);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius);
  padding: 16px 18px;
  box-shadow: var(--shadow-sm);
}
.manager-brief h2 {
  margin: 0 0 8px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}
.manager-brief .body {
  font-size: 13.5px;
  line-height: 1.6;
  color: var(--fg-1);
}
.manager-brief .body h3 {
  margin: 14px 0 6px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--fg-0);
}
.manager-brief .body h3:first-child { margin-top: 0; }
.manager-brief .body ul { padding-left: 20px; margin: 4px 0; }
.manager-brief .body li { margin: 4px 0; }
.manager-brief .body strong { font-weight: 600; color: var(--fg-0); }
.manager-brief .mgr-bullet { display: flex; gap: 10px; align-items: flex-start; margin: 8px 0; }
.manager-brief .mgr-bullet-text { flex: 1; min-width: 0; }
.manager-brief .mgr-bullet-actions { display: flex; gap: 4px; flex-shrink: 0; flex-wrap: nowrap; }
.manager-brief button.mgr-action {
  background: var(--bg-2);
  border: 1px solid var(--line-1);
  color: var(--fg-2);
  font: inherit;
  font-size: 11px;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 5px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 80ms, border-color 80ms, color 80ms;
}
.manager-brief button.mgr-action:hover { color: var(--fg-0); border-color: var(--line-2); background: var(--bg-3); }
.manager-brief button.mgr-action:disabled { opacity: 0.5; cursor: wait; }
.manager-brief button.mgr-action.has-result { color: var(--good); border-color: var(--good-line); background: var(--good-bg); }
.manager-brief button.mgr-action.draft-poc { color: var(--warn); border-color: var(--warn-line); background: var(--warn-bg); }
.manager-brief button.mgr-action.draft-poc:hover { color: var(--bad); border-color: var(--bad-line); background: var(--bad-bg); }
.mgr-poc-picker {
  display: none;
  flex-wrap: wrap;
  gap: 4px;
  margin: 8px 0 0 16px;
  padding: 10px 12px;
  background: var(--bg-2);
  border: 1px solid var(--line-1);
  border-radius: 6px;
  font-size: 11px;
}
.mgr-poc-picker.expanded { display: flex; }
.mgr-poc-picker .label { color: var(--fg-3); margin-right: 4px; align-self: center; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; font-size: 10px; }
.mgr-poc-picker button {
  background: var(--bg-1);
  border: 1px solid var(--line-1);
  color: var(--fg-1);
  font: inherit;
  font-size: 11px;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 5px;
  cursor: pointer;
  transition: background 80ms, border-color 80ms;
}
.mgr-poc-picker button:hover { border-color: var(--accent-line); background: var(--accent-bg); color: var(--fg-0); }
.mgr-poc-picker button:disabled { opacity: 0.5; cursor: wait; }
.mgr-poc-result {
  margin-top: 8px;
  margin-left: 16px;
  padding: 12px 14px;
  background: var(--bg-2);
  border: 1px solid var(--line-1);
  border-left: 3px solid var(--warn);
  border-radius: 0 6px 6px 0;
  font-size: 12.5px;
  line-height: 1.55;
}
.mgr-poc-result.applied { border-left-color: var(--good); }
.mgr-poc-result.discarded { border-left-color: var(--fg-3); }
.mgr-poc-result.failed { border-left-color: var(--bad); }
.mgr-poc-result.running { border-left-color: var(--warn); }
.mgr-poc-result h3, .mgr-poc-result h4 {
  margin: 8px 0 4px;
  font-size: 12px; font-weight: 600;
  color: var(--fg-0); text-transform: none; letter-spacing: 0;
}
.mgr-poc-result code {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg-1); border: 1px solid var(--line-1);
  padding: 1px 5px; border-radius: 4px; font-size: 11.5px;
  color: var(--fg-0);
}
.mgr-poc-result .files { display: flex; flex-wrap: wrap; gap: 4px 8px; margin: 6px 0; font-size: 11px; }
.mgr-poc-result .files code { background: var(--bg-1); }
.mgr-poc-result pre.diff {
  background: var(--bg-code); border: 1px solid var(--line-1);
  border-radius: 5px; padding: 10px 12px; margin: 8px 0;
  font: 11.5px/1.5 'JetBrains Mono', ui-monospace, monospace; color: var(--fg-2);
  max-height: 280px; overflow: auto; white-space: pre;
}
.mgr-poc-result .added { color: var(--good); background: oklch(45% 0.110 145 / 0.08); display: block; }
.mgr-poc-result .removed { color: var(--bad); background: oklch(45% 0.140 25 / 0.08); display: block; }
.mgr-poc-result .header { color: var(--accent); display: block; }
.mgr-poc-result .actions { display: flex; gap: 6px; margin-top: 10px; }
.mgr-poc-result button.apply { color: var(--good); border-color: var(--good-line); background: var(--good-bg); }
.mgr-poc-result button.apply:hover { background: var(--good-bg); border-color: var(--good); }
.mgr-poc-result button.discard { color: var(--bad); border-color: var(--bad-line); background: var(--bad-bg); }
.mgr-poc-result button.discard:hover { background: var(--bad-bg); border-color: var(--bad); }
.mgr-poc-meta { font-size: 11px; color: var(--fg-3); margin-top: 8px; font-family: 'JetBrains Mono', monospace; }
.mgr-poc-banner {
  display: inline-flex; align-items: center;
  font-size: 10px; padding: 2px 7px; border-radius: 4px;
  letter-spacing: 0.04em; margin-bottom: 8px;
  font-weight: 600; text-transform: uppercase;
  border: 1px solid var(--line-1);
  background: var(--bg-1);
  color: var(--fg-2);
}
.mgr-poc-banner.PENDING  { color: var(--warn); border-color: var(--warn-line); background: var(--warn-bg); }
.mgr-poc-banner.APPLIED  { color: var(--good); border-color: var(--good-line); background: var(--good-bg); }
.mgr-poc-banner.DISCARDED{ color: var(--fg-3); }
.mgr-poc-banner.RUNNING  { color: var(--warn); border-color: var(--warn-line); background: var(--warn-bg); }
.mgr-poc-banner.FAILED   { color: var(--bad); border-color: var(--bad-line); background: var(--bad-bg); }
.mgr-action-output {
  margin-top: 8px;
  margin-left: 16px;
  padding: 12px 14px;
  background: var(--bg-2);
  border: 1px solid var(--line-1);
  border-left: 3px solid var(--accent);
  border-radius: 0 6px 6px 0;
  font-size: 12.5px;
  line-height: 1.55;
  display: none;
}
.mgr-action-output.expanded { display: block; }
.mgr-action-output.failed { border-left-color: var(--bad); }
.mgr-action-output.running { border-left-color: var(--warn); }
.mgr-action-output h3, .mgr-action-output h4 {
  margin: 8px 0 4px;
  font-size: 12px;
  font-weight: 600;
  color: var(--fg-0);
  text-transform: none; letter-spacing: 0;
}
.mgr-action-output ul { padding-left: 18px; margin: 4px 0 8px; }
.mgr-action-output li { margin: 3px 0; }
.mgr-action-output code {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg-1); border: 1px solid var(--line-1);
  padding: 1px 5px; border-radius: 4px;
  font-size: 11.5px;
  color: var(--fg-0);
}
.mgr-action-meta { font-size: 11px; color: var(--fg-3); margin-top: 8px; font-family: 'JetBrains Mono', monospace; }
.manager-brief .body code {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg-2); border: 1px solid var(--line-1);
  padding: 1px 5px; border-radius: 4px;
  font-size: 12px;
  color: var(--fg-0);
}
.manager-brief .meta {
  margin-top: 12px;
  font-size: 11px;
  color: var(--fg-3);
  font-family: 'JetBrains Mono', monospace;
}
.manager-brief button.refresh-mgr {
  background: var(--bg-2);
  border: 1px solid var(--line-1);
  color: var(--fg-2);
  font: inherit;
  font-size: 12px;
  font-weight: 500;
  padding: 5px 12px;
  border-radius: 5px;
  cursor: pointer;
  transition: background 80ms, border-color 80ms, color 80ms;
}
.manager-brief button.refresh-mgr:hover { color: var(--fg-0); border-color: var(--line-2); background: var(--bg-3); }
.manager-brief button.refresh-mgr:disabled { opacity: 0.5; cursor: wait; }
.manager-brief .stale {
  display: inline-flex; align-items: center;
  background: var(--warn-bg);
  color: var(--warn);
  border: 1px solid var(--warn-line);
  padding: 1px 7px;
  border-radius: 4px;
  font-size: 10px;
  margin-left: 6px;
  letter-spacing: 0.06em;
  font-weight: 600;
}
.idea-box {
  margin: 0 0 14px;
  padding: 12px 14px;
  background: var(--bg-2);
  border: 1px dashed var(--line-1);
  border-radius: 6px;
}
.idea-box label {
  display: block;
  font-size: 11px;
  color: var(--fg-3);
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.idea-box textarea {
  width: 100%;
  min-height: 54px;
  background: var(--bg-1);
  border: 1px solid var(--line-1);
  border-radius: 5px;
  color: var(--fg-0);
  font: inherit;
  font-size: 13px;
  padding: 8px 10px;
  resize: vertical;
}
.idea-box textarea:focus { outline: none; border-color: var(--accent-line); }
.idea-box .row { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
.idea-box .hint { font-size: 11.5px; color: var(--fg-3); }
.idea-box .hint.warn { color: var(--bad); }
@keyframes shake-x {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-4px); }
  40%, 80% { transform: translateX(4px); }
}
.idea-box textarea.shake { animation: shake-x 0.32s ease-in-out; border-color: var(--bad); }
.idea-box button.submit-idea {
  background: var(--accent);
  color: white;
  border: 1px solid transparent;
  font: inherit;
  font-size: 12px;
  font-weight: 500;
  padding: 6px 16px;
  border-radius: 6px;
  cursor: pointer;
}
.idea-box button.submit-idea:hover { background: oklch(72% 0.165 254); }
.idea-box button.submit-idea:disabled { opacity: 0.5; cursor: not-allowed; }
.idea-box button.submit-idea.is-busy:disabled { cursor: wait; }
.idea-pending {
  margin-top: 8px;
  padding: 10px 12px;
  background: var(--bg-1);
  border: 1px solid var(--line-1);
  border-left: 3px solid var(--warn);
  border-radius: 0 5px 5px 0;
  font-size: 12.5px;
}
.idea-pending.failed { border-left-color: var(--bad); }
.idea-pending .raw { color: var(--fg-3); font-style: italic; font-size: 11.5px; }
.user-idea-marker {
  display: inline-flex; align-items: center;
  background: var(--accent-bg);
  color: var(--accent);
  border: 1px solid var(--accent-line);
  padding: 1px 7px;
  border-radius: 4px;
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.06em;
  margin-right: 6px;
  text-transform: uppercase;
}

/* Spinner + live-running animation */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse-bg {
  0%, 100% { background-color: var(--bg); }
  50%      { background-color: rgba(210, 153, 34, 0.06); }
}
.spinner {
  display: inline-block;
  width: 12px;
  height: 12px;
  border: 2px solid var(--warn-bg);
  border-top-color: var(--warn);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
  margin-right: 8px;
  vertical-align: -2px;
}
.running-panel {
  animation: pulse-bg 2.4s ease-in-out infinite;
}
.running-line {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12.5px;
}
.running-line .running-phase { color: var(--fg-1); }
.running-line .running-elapsed {
  font-family: 'JetBrains Mono', monospace;
  font-variant-numeric: tabular-nums;
  font-size: 11px;
  color: var(--fg-3);
  margin-left: auto;
  letter-spacing: 0.04em;
}
.running-bar {
  margin-top: 8px;
  height: 3px;
  background: var(--bg-1);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}
.running-bar::after {
  content: "";
  position: absolute;
  inset: 0;
  width: 30%;
  background: linear-gradient(90deg,
    transparent,
    var(--warn),
    transparent);
  animation: bar-slide 1.6s ease-in-out infinite;
}
@keyframes bar-slide {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(400%); }
}

/* Minimize + tabs */
.manager-brief .header-controls {
  display: flex;
  align-items: center;
  gap: 6px;
}
.manager-brief button.icon-btn {
  background: var(--bg-2);
  border: 1px solid var(--line-1);
  color: var(--fg-2);
  font: inherit;
  font-size: 13px;
  padding: 3px 9px;
  border-radius: 5px;
  cursor: pointer;
  line-height: 1;
}
.manager-brief button.icon-btn:hover { color: var(--fg-0); border-color: var(--line-2); background: var(--bg-3); }
.manager-brief select.model-select {
  background: var(--bg-2);
  border: 1px solid var(--line-1);
  color: var(--fg-2);
  font: inherit;
  font-size: 11.5px;
  padding: 4px 8px;
  border-radius: 5px;
  cursor: pointer;
}
.manager-brief select.model-select:hover,
.manager-brief select.model-select:focus { color: var(--fg-0); border-color: var(--line-2); outline: none; }
.manager-brief select.model-select.overridden { color: var(--accent); border-color: var(--accent-line); background: var(--accent-bg); }
.manager-brief .model-select-label {
  font-size: 11px; color: var(--fg-3); font-weight: 600; letter-spacing: 0.06em;
  text-transform: uppercase; margin-right: 2px; cursor: help;
}
.manager-brief .session-cost {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px; color: var(--fg-3);
  font-variant-numeric: tabular-nums;
  margin: 0 8px 0 4px; cursor: help; min-width: 60px; text-align: right;
}
.manager-brief .session-cost.spending { color: var(--warn); }
.manager-brief .session-cost.warn { color: var(--bad); }

/* Failed-idea dismiss × */
.idea-pending {
  position: relative;
  padding-right: 32px;
}
.idea-pending button.dismiss-idea {
  position: absolute; top: 8px; right: 8px;
  width: 20px; height: 20px; border-radius: 4px;
  background: transparent; border: 1px solid var(--line-1);
  color: var(--fg-3); font: inherit; font-size: 12px;
  line-height: 1; cursor: pointer; padding: 0;
}
.idea-pending button.dismiss-idea:hover { color: var(--bad); border-color: var(--bad-line); background: var(--bad-bg); }

/* Fleet health pill row */
.fleet-health {
  margin: 0 0 16px;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  font-size: 12px;
}
.fleet-health .pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 11px; border-radius: 999px;
  background: var(--bg-2);
  border: 1px solid var(--line-1);
  cursor: pointer; user-select: none;

}
.fleet-health .pill:hover { border-color: var(--line-2); background: var(--bg-3); color: var(--fg-0); }
.fleet-health .pill .status-dot { width: 7px; height: 7px; }
.fleet-health .pill.zero { opacity: 0.45; cursor: default; }
.fleet-health .pill.zero:hover { border-color: var(--line-1); background: var(--bg-2); color: var(--fg-1); }
.fleet-health .label { color: var(--fg-3); margin-right: 4px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; font-size: 11px; }

/* Card jump-flash (used when fleet-pill click scrolls to a card) */

  50%      { box-shadow: 0 0 0 2px var(--accent), var(--shadow-sm); }

/* Bullet headline + expand toggle (F4) */
.mgr-bullet-text { position: relative; }

.mgr-bullet.collapsible.expanded .mgr-bullet-detail { display: inline; }
.mgr-bullet button.bullet-expand {

}
.mgr-bullet button.bullet-expand:hover { text-decoration: underline; }

/* Auto-collapsed PoC result (F5) — applied/discarded > 1h old */
.mgr-poc-result.auto-archived > *:not(.result-header) { display: none; }
.mgr-poc-result.auto-archived .result-header { opacity: 0.7; }

/* Section batch-refresh button (F8) */
.brief-section-h3 { display: flex; align-items: center; gap: 8px; }
.brief-section-h3 button.refresh-stale {

/* F10 — clickable file-path code span */

  border: 1px solid var(--accent-line);

/* F11 — show-prompt collapsible footer */
.show-prompt-row {
  margin-top: 8px;
  display: flex; align-items: center; gap: 10px;
}
.show-prompt-row button.show-prompt {
  background: transparent;
  border: 1px solid var(--line-1);

  font: inherit; font-size: 11px; font-weight: 500;

.show-prompt-row button.show-prompt:hover { color: var(--fg-0); border-color: var(--line-2); background: var(--bg-2); }

.show-prompt-pane {

/* Max-quota-low nudge banner */
.quota-nudge {

  border-radius: 0 5px 5px 0;
  font-size: 12.5px;
  color: var(--fg-0);

}

}
.quota-nudge button.switch-haiku {

.mgr-tabs {

.mgr-action-output .toggle-result,

.card .open-link {

.status-dot {

button.refresh-ns {

<body>
<header class="appbar">
  <div class="brand">
    <div class="brand-mark"></div>
    <span>Utilization</span>
  </div>
  <div class="crumbs">
    <span class="current">Projects</span>
  </div>
  <div class="tabs">
    <a class="tab" href="/utilization/">Utilization</a>
    <a class="tab active" href="/utilization/projects/">Projects</a>
  </div>
  <div class="updated" id="updated-wrap">
    <span class="dot"></span>
    <span id="updated" title="Last time the project-snapshot poll completed. The Manager's Brief and per-card next-steps have their own freshness shown inline.">—</span>
  </div>
</header>

<main class="page">

<div class="manager-brief" id="manager-brief">
  <h2>
    <span>Manager's brief · portfolio view <span id="mgr-stale"></span></span>
    <span class="header-controls">
      <span class="model-select-label" title="Model the next action you click will use. 'auto' lets the inference router pick (typically Sonnet via Claude Max while Max has quota).">Model:</span>
      <select id="mgr-model" class="model-select" title="Model hint applied to all subsequent actions on this page (Plan, Investigate, Draft PoC, Refresh, Submit-idea). 'auto' lets the inference router pick.">
        <option value="">auto</option>
        <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
        <option value="claude-sonnet-4-5">Sonnet 4.5</option>
        <option value="claude-opus-4-1">Opus 4.1</option>
      </select>
      <span class="session-cost" id="session-cost" title="Total cost of dispatches that completed since you opened this page. Resets on reload. Sums the cost_usd recorded in the action/proposal/user_idea rows."></span>
      <button class="icon-btn" id="btn-minimize-mgr" type="button" title="Minimize the manager panel">–</button>
      <button class="refresh-mgr" id="btn-refresh-mgr" type="button" title="Re-run the manager agent over all 7 projects. Roughly $0.10 on Opus, $0.03 on Sonnet, $0.01 on Haiku — or free if Claude Max session has capacity.">Refresh</button>
    </span>
  </h2>
  <div class="mgr-tabs" id="mgr-tabs"></div>
  <div class="idea-box">
    <label for="idea-input">Submit an idea — manager will read context and add a bullet</label>
    <textarea id="idea-input" placeholder="e.g. We should integrate Modento into the intake auto-filing pipeline so manual review queues stay synced." maxlength="4000"></textarea>
    <div class="row">
      <span class="hint">Opus will fit it into the right section, citing relevant projects.</span>

    </div>

  </div>
  <div class="quota-nudge" id="quota-nudge">
    <span id="quota-nudge-text"></span>
    <button class="switch-haiku" type="button" title="Set the model selector to Haiku 4.5 — much cheaper API calls (~$0.005/Plan-it) until your Claude Max session resets.">Switch to Haiku</button>
    <button class="dismiss-nudge" type="button" title="Hide for this session">×</button>
  </div>
  <div class="body" id="mgr-body"><em>No brief yet — click Refresh.</em></div>
  <div class="meta" id="mgr-meta"></div>
  <div class="show-prompt-row" id="show-prompt-row" style="display:none;">
    <button class="show-prompt" id="btn-show-prompt" type="button" title="Show the exact prompt that produced this brief, so you can verify what context the manager agent saw.">Show prompt</button>
    <span class="meta" id="show-prompt-meta" style="font-size:10px;color:var(--text-dim);"></span>
  </div>
  <div class="show-prompt-pane" id="show-prompt-pane">
    <div class="meta" id="show-prompt-info"></div>
    <pre id="show-prompt-content"></pre>
  </div>
</div>

<div class="fleet-health" id="fleet-health"></div>
<div id="domains"></div>

<script>
function escapeStr(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ---------------------------------------------------------------------------
// Live "running" UI: animated spinner + elapsed timer + phase-appropriate
// status text. Refreshes via setInterval on each .running panel so the
// screen stays alive between the 4s adaptive polls.
// ---------------------------------------------------------------------------

const _runningTimers = new WeakMap();   // element -> interval id

function _phaseFor(action, sec) {
  if (action === 'plan') {
    if (sec < 5)  return 'Bundling portfolio context…';
    if (sec < 15) return 'Sonnet reading the project landscape…';
    if (sec < 45) return 'Sonnet drafting the implementation plan…';
    return 'Sonnet finalizing the plan…';
  }
  if (action === 'investigate') {
    if (sec < 5)  return 'Bundling project context…';
    if (sec < 15) return 'Agent reading source files…';
    if (sec < 45) return 'Agent grepping the codebase for evidence…';
    if (sec < 90) return 'Agent synthesizing findings…';
    return 'Agent wrapping up the report…';
  }
  if (action === 'draft-poc') {
    if (sec < 5)   return 'Creating an isolated git worktree…';
    if (sec < 15)  return 'Bundling project context…';
    if (sec < 45)  return 'Agent reading code…';
    if (sec < 90)  return 'Agent drafting the change…';
    if (sec < 150) return 'Agent writing files in the worktree…';
    return 'Capturing the diff and finalizing…';
  }
  if (action === 'user-idea') {
    if (sec < 5)  return 'Bundling portfolio context…';
    if (sec < 15) return 'Opus reading the projects…';
    if (sec < 45) return 'Opus shaping a polished bullet…';
    return 'Opus finalizing the bullet…';
  }
  return 'Working…';
}

function _formatElapsed(sec) {
  if (sec < 60) return sec + 's';
  const m = Math.floor(sec / 60), s = sec % 60;
  return m + ':' + String(s).padStart(2, '0');
}

function buildRunningHtml(action, startIso, label) {
  // label is the visible kind of work, e.g. "Plan" / "Investigate" / "PoC"
  return `
    <div class="running-line">
      <span class="spinner"></span>
      <span class="running-phase" data-action="${escapeStr(action)}"
            data-start="${escapeStr(startIso || '')}">${escapeStr(label || 'Working…')}</span>
      <span class="running-elapsed">0s</span>
    </div>
    <div class="running-bar"></div>
  `;
}

// ---------------------------------------------------------------------------
// Minimize + tabs + per-result collapse
// ---------------------------------------------------------------------------

const MGR_MINIMIZED_KEY = 'utilization.mgrMinimized';
const MGR_ACTIVE_TAB_KEY = 'utilization.mgrActiveTab';
const MGR_COLLAPSED_RESULTS_KEY = 'utilization.mgrCollapsedResults';
const MGR_MODEL_HINT_KEY = 'utilization.mgrModelHint';

function getModelHint() {
  // Returns the user's selected model id, or '' meaning "let router decide".
  return localStorage.getItem(MGR_MODEL_HINT_KEY) || '';
}

function wireUpModelSelector() {
  const sel = document.getElementById('mgr-model');
  if (!sel || sel.dataset.wired === '1') return;
  sel.dataset.wired = '1';
  const cur = getModelHint();
  if (cur && [...sel.options].some(o => o.value === cur)) sel.value = cur;
  sel.classList.toggle('overridden', !!sel.value);
  sel.addEventListener('change', () => {
    localStorage.setItem(MGR_MODEL_HINT_KEY, sel.value);
    sel.classList.toggle('overridden', !!sel.value);
    updateResolvedModelHint();
  });
}

// Show the resolved model in the selector's title attribute. When the user
// has 'auto' selected, peek at the most recent action result to surface what
// the router actually picked last time — usually a faithful predictor of the
// next call's model. Addresses the "what is auto going to do?" friction.
function updateResolvedModelHint() {
  const sel = document.getElementById('mgr-model');
  if (!sel) return;
  const baseTitle = "Model hint applied to all subsequent actions on this page (Plan, Investigate, Draft PoC, Refresh, Submit-idea). 'auto' lets the inference router pick.";
  if (sel.value) {
    sel.title = baseTitle + ` Currently overridden to ${sel.options[sel.selectedIndex].text}.`;
    return;
  }
  const last = window._lastDispatchSummary;
  if (last) {
    sel.title = baseTitle + ` Last 'auto' dispatch resolved to: ${last.provider} (${last.model}) ${last.age_text}.`;
  } else {
    sel.title = baseTitle;
  }
}

// F9 — running cost total. Watches all action/proposal/user_idea rows that
// completed since this page loaded and sums their cost_usd.
const _PAGE_LOAD_TS = Date.now();
function updateSessionCostFromActions(actions, proposals, userIdeas) {
  let total = 0;
  let countedRows = 0;
  let lastDispatch = null;
  const consider = (row) => {
    if (!row || !row.ts) return;
    const t = new Date(row.ts).getTime();
    if (isNaN(t) || t < _PAGE_LOAD_TS) return;
    if ((row.cost_usd || 0) > 0) {
      total += row.cost_usd;
      countedRows++;
    }
    // Track the most recent dispatch (any model) for the resolved-hint preview
    if (row.provider_used && (!lastDispatch || row.ts > lastDispatch.ts)) {
      lastDispatch = {
        provider: row.provider_used,
        model: row.model_used,
        ts: row.ts,
      };
    }
  };
  for (const byAction of Object.values(actions || {})) {
    for (const row of Object.values(byAction)) consider(row);
  }
  for (const byProj of Object.values(proposals || {})) {
    for (const row of Object.values(byProj)) consider(row);
  }
  for (const u of (userIdeas || [])) consider(u);

  if (lastDispatch) {
    lastDispatch.age_text = fmtAge(lastDispatch.ts);
    window._lastDispatchSummary = lastDispatch;
  }
  updateResolvedModelHint();

  const el = document.getElementById('session-cost');
  if (!el) return;
  if (countedRows === 0) {
    el.textContent = '';
    el.title = 'No completed dispatches since this page loaded.';
    el.classList.remove('spending', 'warn');
    return;
  }
  el.textContent = '$' + total.toFixed(3) + ` · ${countedRows} runs`;
  el.title = `Total cost of ${countedRows} dispatches that completed since this page loaded. Resets on reload.`;
  el.classList.toggle('warn', total > 1.0);
  el.classList.toggle('spending', total > 0 && total <= 1.0);
}

function loadCollapsedResults() {
  try {
    return new Set(JSON.parse(localStorage.getItem(MGR_COLLAPSED_RESULTS_KEY) || '[]'));
  } catch (e) { return new Set(); }
}
function saveCollapsedResults(set) {
  try {
    localStorage.setItem(MGR_COLLAPSED_RESULTS_KEY, JSON.stringify([...set]));
  } catch (e) { /* ignore */ }
}

function applyMinimizedState() {
  const root = document.getElementById('manager-brief');
  const minimized = localStorage.getItem(MGR_MINIMIZED_KEY) === '1';
  if (root) root.classList.toggle('minimized', minimized);
  const btn = document.getElementById('btn-minimize-mgr');
  if (btn) btn.textContent = minimized ? '+' : '_';
  if (btn) btn.title = minimized ? 'Expand the manager panel' : 'Minimize the manager panel';
}
function wireUpMinimize() {
  const btn = document.getElementById('btn-minimize-mgr');
  if (!btn || btn.dataset.wired === '1') return;
  btn.dataset.wired = '1';
  btn.addEventListener('click', () => {
    const cur = localStorage.getItem(MGR_MINIMIZED_KEY) === '1';
    localStorage.setItem(MGR_MINIMIZED_KEY, cur ? '0' : '1');
    applyMinimizedState();
  });
}

function renderTabs() {
  const tabs = document.getElementById('mgr-tabs');
  const sections = window._lastManagerSections || [];
  if (!tabs) return;
  if (!sections.length) {
    tabs.innerHTML = '';
    return;
  }
  const active = localStorage.getItem(MGR_ACTIVE_TAB_KEY) || 'all';
  const totalBullets = sections.reduce((n, s) => n + s.bullets.length, 0);
  const buttons = [
    `<button data-section-id="all" class="${active === 'all' ? 'active' : ''}">
       All <span class="count">${totalBullets}</span>
     </button>`
  ];
  for (let si = 0; si < sections.length; si++) {
    const s = sections[si];
    if (!s.bullets.length) continue;
    const sid = `s${si}`;
    buttons.push(
      `<button data-section-id="${sid}" class="${active === sid ? 'active' : ''}">
         ${escapeStr(s.section)} <span class="count">${s.bullets.length}</span>
       </button>`
    );
  }
  tabs.innerHTML = buttons.join('');
  // Wire clicks
  tabs.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      localStorage.setItem(MGR_ACTIVE_TAB_KEY, btn.dataset.sectionId);
      applyTabFilter();
    });
  });
}

function applyTabFilter() {
  const root = document.getElementById('manager-brief');
  if (!root) return;
  const active = localStorage.getItem(MGR_ACTIVE_TAB_KEY) || 'all';
  // Update the active tab button
  document.querySelectorAll('#mgr-tabs button').forEach(b => {
    b.classList.toggle('active', b.dataset.sectionId === active);
  });
  if (active === 'all') {
    root.classList.remove('filtered');
    document.querySelectorAll('#mgr-body > *').forEach(el => {
      el.classList.remove('visible-section');
    });
    return;
  }
  root.classList.add('filtered');
  document.querySelectorAll('#mgr-body > *').forEach(el => {
    if (el.dataset.sectionId === active) el.classList.add('visible-section');
    else el.classList.remove('visible-section');
  });
}

function applyCollapsedResults() {
  const collapsed = loadCollapsedResults();
  document.querySelectorAll('.mgr-action-output, .mgr-poc-result').forEach(el => {
    const key = _resultKey(el);
    if (collapsed.has(key)) el.classList.add('collapsed');
    else el.classList.remove('collapsed');
  });
}
function _resultKey(el) {
  // Compose a stable key for a result element; falls back to nth-child
  const parent = el.parentElement;
  const idx = Array.prototype.indexOf.call(parent ? parent.children : [], el);
  const bullet = el.closest('[data-bullet-hash]');
  const bh = bullet ? bullet.dataset.bulletHash : 'X';
  const action = el.dataset.action || el.querySelector('.mgr-poc-banner')?.textContent || 'r';
  return `${bh}|${action}|${idx}`;
}
function injectResultHeaders() {
  // Add a small "Result · ⌃" header to each result panel for collapse control
  document.querySelectorAll('.mgr-action-output, .mgr-poc-result').forEach(el => {
    if (el.querySelector('.result-header')) return;          // already injected
    if (el.classList.contains('running')) return;            // running state has its own UI
    const header = document.createElement('div');
    header.className = 'result-header';
    const label = el.classList.contains('mgr-poc-result')
      ? 'PoC result'
      : `${(el.dataset.action || 'result')} result`;
    const status = el.querySelector('.mgr-poc-banner');
    // If we auto-archived this result, show ⌃ — the user can click to reveal.
    const isHidden = el.classList.contains('auto-archived') || el.classList.contains('collapsed');
    const chev = isHidden ? '⌃' : '⌄';
    const archivedNote = el.classList.contains('auto-archived')
      ? ` <span style="font-size:10px;color:var(--text-dim);">archived (>1h)</span>`
      : '';
    header.innerHTML = `<span>${escapeStr(label)}</span>${archivedNote}
      ${status ? `<span style="margin-left:auto;"></span>` : '<span style="flex:1"></span>'}
      <button class="toggle-result" type="button" title="Show or hide this result panel.">${chev}</button>`;
    el.insertBefore(header, el.firstChild);
    const btn = header.querySelector('.toggle-result');
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const key = _resultKey(el);
      const collapsed = loadCollapsedResults();
      const isHiddenNow = el.classList.contains('collapsed') || el.classList.contains('auto-archived');
      if (isHiddenNow) {
        el.classList.remove('collapsed');
        el.classList.remove('auto-archived');
        collapsed.delete(key);
        btn.textContent = '⌄';
      } else {
        el.classList.add('collapsed');
        collapsed.add(key);
        btn.textContent = '⌃';
      }
      saveCollapsedResults(collapsed);
    });
  });
}

function activateRunningTimers(root) {
  // Find every .running-line under `root` and start a 1s interval for each
  (root || document).querySelectorAll('.running-line').forEach(line => {
    if (_runningTimers.has(line)) clearInterval(_runningTimers.get(line));
    const phaseEl = line.querySelector('.running-phase');
    const elapsedEl = line.querySelector('.running-elapsed');
    if (!phaseEl || !elapsedEl) return;
    const action = phaseEl.dataset.action || '';
    const startStr = phaseEl.dataset.start || '';
    const start = startStr ? new Date(startStr).getTime() : Date.now();
    const tick = () => {
      const sec = Math.max(0, Math.floor((Date.now() - start) / 1000));
      elapsedEl.textContent = _formatElapsed(sec);
      phaseEl.textContent = _phaseFor(action, sec);
    };
    tick();
    _runningTimers.set(line, setInterval(tick, 1000));
  });
}

// Inline code spans that look like file paths or memory-note names get
// wrapped in a link to the file viewer. The backend /api/file-view
// endpoint validates the path against an allowlist so this is safe to
// pass user-influenced text through.
const FILE_PATH_PATTERN = /^[a-zA-Z0-9_./-]+\.(py|md|txt|json|ya?ml|html|js|css|sh|ps1|sql|log|env|cfg|ini|toml)$/;

function renderInline(s) {
  let out = escapeStr(s);
  out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  out = out.replace(/`([^`]+)`/g, (_m, code) => {
    // Test the unescaped form so the path regex matches naturally.
    if (FILE_PATH_PATTERN.test(code)) {
      const safe = escapeStr(code);
      const href = '/utilization/file-view.html?path=' + encodeURIComponent(code);
      return `<a class="code-link" href="${href}" target="_blank" rel="noopener" title="Open ${safe} in the file viewer (LAN-only).">${safe}</a>`;
    }
    return '<code>' + escapeStr(code) + '</code>';
  });
  return out.replace(/\n/g, '<br>');
}

// Bullets in the Manager's brief follow the pattern
//   **Headline** — paragraph of explanation that may run several sentences
// Default to showing only the headline + first sentence; an expand toggle
// reveals the rest. Avoids the "wall of text" friction the audit surfaced.
function renderBulletWithExpand(text, bulletHash) {
  // Look for the em-dash separator after a bold headline — the canonical
  // "claim — explanation" pattern Opus uses for portfolio bullets.
  const split = text.match(/^(\*\*[^*]+\*\*[^—\n]*?—\s*)([\s\S]+)$/);
  if (!split) {
    return renderInline(text);
  }
  const headline = split[1];
  const detail = split[2];
  // Bail if the detail is already short — no value in hiding ~1 line.
  if (detail.length < 200) return renderInline(text);

  // Prefer cutting at a sentence boundary: period (or ! ?) followed by a
  // space and a capital letter. The capital-letter lookahead avoids stopping
  // at file-extension dots (`mcp_server_http.py`, `Plan A.B`) which were
  // breaking the first heuristic in audit verification.
  let cutAt = -1;
  const sentMatch = detail.match(/[.!?]\s+(?=[A-Z(])/);
  if (sentMatch && sentMatch.index < 280) {
    cutAt = sentMatch.index + 1;  // include the punctuation
  }
  // Fallback: word-boundary truncate around 160 chars so EVERY long bullet
  // collapses, even when the agent wrote one giant comma-spliced sentence.
  if (cutAt < 0) {
    const target = Math.min(160, detail.length - 40);
    const slice = detail.slice(0, target);
    const lastSpace = slice.lastIndexOf(' ');
    cutAt = lastSpace > 80 ? lastSpace : target;
  }
  const firstSentence = detail.slice(0, cutAt).trimEnd();
  const rest = detail.slice(cutAt);
  if (rest.trim().length < 30) return renderInline(text);
  return (
    renderInline(headline + firstSentence) +
    '<span class="mgr-bullet-detail">' + renderInline(rest) + '</span>' +
    ' <button class="bullet-expand" type="button"' +
    ` data-bullet-hash="${escapeStr(bulletHash)}">…more</button>`
  );
}

// Markdown renderer for the manager's brief — supports h3 headers + bullets.
function renderMarkdownRich(md) {
  if (!md) return '<em>Empty.</em>';
  const lines = md.split('\n');
  const out = [];
  let inList = false;
  const flushList = () => { if (inList) { out.push('</ul>'); inList = false; } };
  for (const raw of lines) {
    const ln = raw.trimEnd();
    let m;
    if ((m = ln.match(/^#{2,4}\s+(.+)$/))) {
      flushList();
      out.push(`<h3>${renderInline(m[1])}</h3>`);
    } else if (/^\s*[-*]\s+/.test(ln)) {
      if (!inList) { out.push('<ul>'); inList = true; }
      out.push('<li>' + renderInline(ln.replace(/^\s*[-*]\s+/, '')) + '</li>');
    } else if (ln.trim() === '') {
      flushList();
    } else {
      flushList();
      out.push('<div>' + renderInline(ln) + '</div>');
    }
  }
  flushList();
  return out.join('');
}

// Parse the manager brief into a structured form: array of
// {section: "Cross-project opportunities", bullets: [text, text, ...]}
function parseManagerBrief(md) {
  if (!md) return [];
  const sections = [];
  let current = null;
  let buf = '';
  const pushBuf = () => {
    if (buf.trim() && current) current.bullets.push(buf.trim());
    buf = '';
  };
  for (const raw of md.split('\n')) {
    const ln = raw.trimEnd();
    let m;
    if ((m = ln.match(/^#{2,4}\s+(.+)$/))) {
      pushBuf();
      current = { section: m[1].trim(), bullets: [] };
      sections.push(current);
    } else if (/^\s*[-*]\s+/.test(ln)) {
      pushBuf();
      buf = ln.replace(/^\s*[-*]\s+/, '');
    } else if (ln.trim() === '') {
      pushBuf();
    } else if (current) {
      buf += '\n' + ln;
    }
  }
  pushBuf();
  return sections;
}

async function bulletHashSha1(text) {
  const bytes = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest('SHA-1', bytes);
  return Array.from(new Uint8Array(hash))
    .map(b => b.toString(16).padStart(2, '0'))
    .join('').slice(0, 16);
}

function renderActionResult(action, row) {
  if (!row) return '';
  const klass = row.status === 'ok' ? '' :
                row.status === 'running' ? 'running running-panel' :
                row.status === 'failed' ? 'failed' : '';
  const label = action === 'plan' ? 'Plan' : (action === 'investigate' ? 'Investigate' : action);
  const body = row.status === 'running'
    ? buildRunningHtml(action, row.ts, `${label} in progress`)
    : row.status === 'failed'
      ? '<span style="color:var(--bad);">' + escapeStr(row.error || 'failed') + '</span>'
      : renderMarkdownRich(row.content || '');
  const meta = row.status === 'ok'
    ? `<div class="mgr-action-meta">${escapeStr(action)} · via ${escapeStr(row.provider_used || '')} (${escapeStr(row.model_used || '')}) · ${fmtAge(row.ts)}</div>`
    : '';
  return `<div class="mgr-action-output expanded ${klass}" data-action="${escapeStr(action)}">${body}${meta}</div>`;
}

function renderDiff(diff) {
  if (!diff) return '';
  const lines = diff.split('\n').map(ln => {
    if (ln.startsWith('+++') || ln.startsWith('---') || ln.startsWith('diff '))
      return `<span class="header">${escapeStr(ln)}</span>`;
    if (ln.startsWith('+')) return `<span class="added">${escapeStr(ln)}</span>`;
    if (ln.startsWith('-')) return `<span class="removed">${escapeStr(ln)}</span>`;
    return escapeStr(ln);
  });
  return `<pre class="diff">${lines.join('\n')}</pre>`;
}

function renderPocResult(projectId, projectName, prop) {
  if (!prop) return '';
  const status = (prop.status || 'pending').toUpperCase();
  // F5 — auto-archive applied/discarded results > 1h old. They're done,
  // they don't need to dominate the brief, and a click reveals them.
  let archivedClass = '';
  if (prop.ts && (prop.status === 'applied' || prop.status === 'discarded')) {
    const ageMs = Date.now() - new Date(prop.ts).getTime();
    if (ageMs > 60 * 60 * 1000) archivedClass = ' auto-archived';
  }
  const klass = (prop.status || '').toLowerCase() + (prop.status === 'running' ? ' running-panel' : '') + archivedClass;
  let body = '';
  if (prop.status === 'running') {
    body = buildRunningHtml('draft-poc', prop.ts, `PoC for ${projectName}`);
  } else if (prop.status === 'failed') {
    body = `<span style="color:var(--bad);">${escapeStr(prop.error || 'failed')}</span>`;
  } else {
    body = renderMarkdownRich(prop.summary || '');
    if (prop.files_changed && prop.files_changed.length) {
      body += '<div class="files">' +
        prop.files_changed.map(f => '<code>' + escapeStr(f) + '</code>').join('') +
        '</div>';
    }
    body += renderDiff(prop.diff);
    if (prop.status === 'pending') {
      body += `<div class="actions">
        <button class="bullet-btn apply" data-action="apply"
                data-project-id="${escapeStr(projectId)}"
                data-bullet-hash="${escapeStr(prop.bullet_hash)}">Apply to main</button>
        <button class="bullet-btn discard" data-action="discard"
                data-project-id="${escapeStr(projectId)}"
                data-bullet-hash="${escapeStr(prop.bullet_hash)}">Discard</button>
      </div>`;
    }
  }
  return `
    <div class="mgr-poc-result ${klass}">
      <span class="mgr-poc-banner ${status}">PoC · ${escapeStr(projectName)} · ${status}</span>
      ${body}
      <div class="mgr-poc-meta">via ${escapeStr(prop.provider_used || '')} (${escapeStr(prop.model_used || '')}) · ${fmtAge(prop.ts)}</div>
    </div>
  `;
}

// Merge user-idea bullets (status='ok') into the parsed sections by name.
function foldUserIdeasIntoSections(sections, userIdeas) {
  const okIdeas = (userIdeas || []).filter(u => u.status === 'ok' && u.bullet);
  if (!okIdeas.length) return sections;
  const byName = new Map();
  for (const s of sections) byName.set(s.section, s);
  // Make sure all four canonical section headers exist in render order
  const canonical = ['Cross-project opportunities', 'Patterns', 'Strategic recommendations', 'User-submitted ideas'];
  const merged = [];
  for (const name of canonical) {
    if (byName.has(name)) merged.push(byName.get(name));
    else merged.push({ section: name, bullets: [] });
  }
  // Append any unexpected sections from the original brief (e.g. Opus invented one)
  for (const s of sections) {
    if (!canonical.includes(s.section)) merged.push(s);
  }
  // Distribute user ideas into matching sections
  for (const u of okIdeas) {
    const target = merged.find(s => s.section === (u.section || 'User-submitted ideas'))
                || merged.find(s => s.section === 'User-submitted ideas');
    if (target) {
      target.bullets.push({ text: u.bullet, _userIdea: u });
    }
  }
  return merged;
}

async function renderManagerBulletsWithActions(briefContent, actions, proposalsByBullet, registry, userIdeas) {
  let sections = parseManagerBrief(briefContent);
  if (!sections.length && (!userIdeas || !userIdeas.some(u => u.status === 'ok'))) {
    return renderMarkdownRich(briefContent);
  }
  // Convert string bullets to {text} objects so we can mark user ideas
  sections = sections.map(s => ({
    section: s.section,
    bullets: s.bullets.map(b => typeof b === 'string' ? { text: b } : b),
  }));
  sections = foldUserIdeasIntoSections(sections, userIdeas);

  const blocks = [];
  // Stash the section list on a global so the tab strip can be rendered
  window._lastManagerSections = sections;
  for (let si = 0; si < sections.length; si++) {
    const s = sections[si];
    if (!s.bullets.length) continue;
    const sectionId = `s${si}`;
    blocks.push(`<h3 data-section-id="${sectionId}">${renderInline(s.section)}</h3>`);
    for (const bulletObj of s.bullets) {
      const text = bulletObj.text;
      const isUserIdea = !!bulletObj._userIdea;
      const h = await bulletHashSha1(text);
      const planRow = (actions[h] || {}).plan;
      const investigateRow = (actions[h] || {}).investigate;
      const planClass = planRow && planRow.status === 'ok' ? 'has-result' : '';
      const invClass = investigateRow && investigateRow.status === 'ok' ? 'has-result' : '';
      const props = proposalsByBullet[h] || {};
      const hasPoc = Object.keys(props).length > 0;
      const pocClass = hasPoc ? 'has-result' : '';

      // Build the per-project picker buttons. When the registry is empty
      // (e.g. server failed to load projects.yaml), show a hint so the user
      // doesn't see an empty box and assume the picker is broken.
      const pickerButtons = (registry || []).length
        ? (registry || []).map(p =>
            `<button class="poc-pick"
                     data-project-id="${escapeStr(p.id)}"
                     data-project-name="${escapeStr(p.name)}"
                     data-bullet-hash="${escapeStr(h)}"
                     data-bullet-text="${encodeURIComponent(text)}">${escapeStr(p.name)}</button>`
          ).join('')
        : `<span class="label" style="color:var(--bad);">
             No projects loaded — check server log (projects.yaml / PyYAML).
           </span>`;

      // Render existing PoC results for this bullet
      const pocResults = Object.entries(props).map(([pid, prop]) => {
        const proj = (registry || []).find(p => p.id === pid);
        const projName = proj ? proj.name : pid;
        return renderPocResult(pid, projName, prop);
      }).join('');

      const ideaTag = isUserIdea
        ? '<span class="user-idea-marker">your idea</span>'
        : '';
      const bulletHtml = renderBulletWithExpand(text, h);
      const hasDetail = bulletHtml.includes('mgr-bullet-detail');
      blocks.push(`
        <div class="mgr-bullet${hasDetail ? ' collapsible' : ''}" data-section-id="${sectionId}">
          <div class="mgr-bullet-text">${ideaTag}${bulletHtml}</div>
          <div class="mgr-bullet-actions">
            <button class="mgr-action plan ${planClass}"
                    data-bullet-hash="${escapeStr(h)}"
                    data-bullet-text="${encodeURIComponent(text)}"
                    data-section="${escapeStr(s.section)}"
                    title="Sonnet drafts an implementation plan for this bullet (~30-90s). Free on Claude Max; ~$0.02 on Sonnet API; ~$0.005 on Haiku.">Plan it</button>
            <button class="mgr-action investigate ${invClass}"
                    data-bullet-hash="${escapeStr(h)}"
                    data-bullet-text="${encodeURIComponent(text)}"
                    data-section="${escapeStr(s.section)}"
                    title="Read-only agent (Read/Grep/Glob) gathers concrete evidence for this bullet's claim, ~30-120s. Free on Claude Max; ~$0.02 on Sonnet API.">Investigate</button>
            <button class="mgr-action draft-poc ${pocClass}"
                    data-bullet-hash="${escapeStr(h)}"
                    title="Open the project picker — agent will edit ONE project's worktree to demonstrate this recommendation. ~1-3 min, ~$0.05 on Sonnet, ~$0.20 on Opus.">Draft PoC ▾</button>
          </div>
        </div>
        <div class="mgr-poc-picker" data-bullet-hash="${escapeStr(h)}" data-section-id="${sectionId}">
          <span class="label">Pick a project:</span>
          ${pickerButtons}
        </div>
        <div class="mgr-action-result-slot" data-bullet-hash="${escapeStr(h)}" data-section-id="${sectionId}">
          ${renderActionResult('plan', planRow)}
          ${renderActionResult('investigate', investigateRow)}
          ${pocResults}
        </div>
      `);
    }
  }
  return blocks.join('\n');
}

function fmtAge(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return '—';
  const ago = (Date.now() - d.getTime()) / 1000;
  if (ago < 60) return Math.round(ago) + 's ago';
  if (ago < 3600) return Math.round(ago / 60) + 'm ago';
  if (ago < 86400) return Math.round(ago / 3600) + 'h ago';
  return Math.round(ago / 86400) + 'd ago';
}

function statusClass(level) {
  return 'status-' + (level || 'unknown');
}

// Tiny markdown renderer — bullet list + simple inline. We only ask Claude
// for bullets, so this is enough; we fall back to raw text for anything else.
function renderMarkdown(md) {
  if (!md) return '<em>No recommendations yet — click Refresh.</em>';
  const lines = md.trim().split('\n');
  const out = [];
  let inList = false;
  for (const raw of lines) {
    const ln = raw.trimEnd();
    if (/^\s*[-*]\s+/.test(ln)) {
      if (!inList) { out.push('<ul>'); inList = true; }
      out.push('<li>' + escape(ln.replace(/^\s*[-*]\s+/, '')) + '</li>');
    } else if (ln.trim() === '') {
      if (inList) { out.push('</ul>'); inList = false; }
    } else {
      if (inList) { out.push('</ul>'); inList = false; }
      out.push('<div>' + escape(ln) + '</div>');
    }
  }
  if (inList) out.push('</ul>');
  return out.join('');
}
function escape(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function bundleSummaryLine(b) {
  if (!b) return '';
  const parts = [];
  if (b.repo_files_included && b.repo_files_included.length)
    parts.push(b.repo_files_included.length + ' repo file(s)');
  if (b.memory_files_included && b.memory_files_included.length)
    parts.push(b.memory_files_included.length + ' memory note(s)');
  if (b.git_commits_included)
    parts.push(b.git_commits_included + ' commit(s)');
  if (b.log_lines_included)
    parts.push(b.log_lines_included + ' log line(s)');
  return parts.join(' · ');
}

function buildCard(p) {
  const card = document.createElement('div');
  card.className = 'card clickable';
  card.dataset.projectId = p.id;
  card.addEventListener('click', (e) => {
    // Don't navigate if the click was on a button or link inside the card.
    if (e.target.closest('button, a')) return;
    window.location.href = '/utilization/projects/' + encodeURIComponent(p.id) + '/';
  });

  const reason = p.overall_reason ? p.overall_reason : '';

  const lastCommit = p.health && p.health.last_commit_age_days != null
    ? p.health.last_commit_age_days.toFixed(1) + 'd'
    : '—';
  const logAge = p.health && p.health.log_age_hours != null
    ? p.health.log_age_hours.toFixed(1) + 'h'
    : '—';

  card.innerHTML = `
    <h2>
      <span class="status-dot ${statusClass(p.overall)}"></span>
      ${escape(p.name)}
      <span class="tag phase">${escape(p.phase || '')}</span>
    </h2>
    <div class="row" style="font-size:12px;color:var(--text-dim);">
      ${escape(reason)}
    </div>
    <div class="desc">${escape(p.description || '')}</div>
    <div class="meta">
      <div>service</div>           <div class="v"${(p.health && p.health.service) ? '' : ' title="No NSSM service registered (e.g. embedded under another service\'s venv, or not deployed yet)."'}>${escape((p.health && p.health.service) || '—')} ${escape((p.health && p.health.service_status) || '')}</div>
      <div>last commit</div>       <div class="v">${lastCommit}${p.health && p.health.last_commit_subject ? ' — ' + escape(p.health.last_commit_subject) : ''}</div>
      <div>log freshness</div>     <div class="v"${(p.health && p.health.log_age_hours != null) ? '' : ' title="No log file at the configured path (or no log_path set in projects.yaml)."'}>${logAge}</div>
      <div>repo path</div>         <div class="v">${escape(p.repo_path)}</div>
    </div>
    <div class="next">
      <h3>
        <span>Next steps</span>
        <button class="refresh-ns" data-project-id="${escape(p.id)}">Refresh</button>
      </h3>
      <div class="next-content" id="ns-${escape(p.id)}">${renderMarkdownRich((p.next_steps && p.next_steps.content) || '')}</div>
      <div class="next-meta" id="ns-meta-${escape(p.id)}">
        ${p.next_steps && p.next_steps.ts
          ? `generated ${fmtAge(p.next_steps.ts)} via ${escape(p.next_steps.provider_used || '')} (${escape(p.next_steps.model_used || '')}); ${bundleSummaryLine(p.next_steps.bundle_summary)}`
          : ''}
      </div>
      <a class="open-link" href="/utilization/projects/${encodeURIComponent(p.id)}/">Open detail view →</a>
    </div>
  `;

  card.querySelector('button.refresh-ns').addEventListener('click', async (e) => {
    const btn = e.currentTarget;
    btn.disabled = true; const orig = btn.textContent;
    btn.textContent = 'Generating…';
    const target = document.getElementById('ns-' + p.id);
    target.innerHTML = '<em>Asking Claude (this can take 30-60s)…</em>';
    try {
      const r = await fetch(`/utilization/api/projects/${encodeURIComponent(p.id)}/refresh-next-steps`,
                            { method: 'POST' });
      const d = await r.json();
      if (!r.ok || d.error) {
        target.innerHTML = `<div class="bullet-error">${escape(d.error || 'failed')}</div>`;
      } else {
        target.innerHTML = renderMarkdownRich(d.content || '');
        document.getElementById('ns-meta-' + p.id).textContent =
          `generated just now via ${d.provider || ''} (${d.model || ''}); ${bundleSummaryLine(d.bundle_summary)}`;
      }
    } catch (err) {
      target.innerHTML = `<div class="bullet-error">${escape(err.message || err)}</div>`;
    } finally {
      btn.textContent = orig; btn.disabled = false;
    }
  });

  return card;
}

// F6 — render a fleet health summary above the project grid: counts of
// green / yellow / red projects with click-to-jump pills. Also adds a
// "Refresh stale next-steps" button so an operator who arrives to a wall
// of "click Refresh" cards can fan them out in one click (F8).
function renderFleetHealth(projects) {
  const root = document.getElementById('fleet-health');
  if (!root) return;
  const counts = { green: 0, yellow: 0, red: 0, unknown: 0 };
  for (const p of projects) {
    const o = (p.overall || 'unknown').toLowerCase();
    if (counts[o] !== undefined) counts[o]++;
    else counts.unknown++;
  }
  const total = projects.length;
  const pill = (status, label, n) =>
    `<span class="pill ${n === 0 ? 'zero' : ''}" data-target-status="${status}"
            title="${escape(label)} — click to jump to the first ${status} card">
       <span class="status-dot status-${status}"></span>${n} ${escape(label)}
     </span>`;
  root.innerHTML =
    `<span class="label">Fleet (${total}):</span>` +
    pill('green',   'healthy',  counts.green) +
    pill('yellow',  'stale',    counts.yellow) +
    pill('red',     'severe',   counts.red) +
    pill('unknown', 'unknown',  counts.unknown) +
    `<button class="refresh-stale" type="button"
             title="Fan out parallel /refresh-next-steps to every card whose recommendations are missing or older than ~24h. Each is one Sonnet call.">
       Refresh stale next-steps
     </button>` +
    `<a class="legend-link" href="#" title="Status legend:
green: service running and log fresh
yellow: log stale (1×–3× threshold) or service status unclear
red: service stopped, OR log severely stale (>3× threshold)
unknown: no signals (e.g. embedded/no-service projects)
">legend</a>`;
}

async function refresh() {
  try {
    const r = await fetch('/utilization/api/projects/snapshot', { cache: 'no-store' });
    if (!r.ok) throw new Error('snapshot ' + r.status);
    const d = await r.json();
    const root = document.getElementById('domains');
    root.innerHTML = '';
    renderFleetHealth(d.projects || []);
    wireUpFleetHealthPill();
    wireUpBatchRefresh();

    // Group by domain, preserving order of first appearance
    const byDomain = new Map();
    for (const p of d.projects || []) {
      const k = p.domain || '';
      if (!byDomain.has(k)) byDomain.set(k, []);
      byDomain.get(k).push(p);
    }

    for (const [domain, projs] of byDomain) {
      const h = document.createElement('div');
      h.className = 'domain';
      h.textContent = domain || '(uncategorized)';
      root.appendChild(h);
      const grid = document.createElement('div');
      grid.className = 'grid';
      for (const p of projs) grid.appendChild(buildCard(p));
      root.appendChild(grid);
    }

    document.getElementById('updated').textContent =
      'updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('updated').textContent = 'fetch error: ' + e.message;
  }
}

// Manager's brief — render existing + wire up refresh + adaptive polling
let _mgrPollTimer = null;
function _scheduleMgrPoll(hasRunning) {
  if (_mgrPollTimer) clearTimeout(_mgrPollTimer);
  // Faster poll while any task is in flight, slower otherwise
  const ms = hasRunning ? 4000 : 60000;
  _mgrPollTimer = setTimeout(loadManagerBrief, ms);
}

async function loadManagerBrief() {
  try {
    const [snapRes, actionsRes] = await Promise.all([
      fetch('/utilization/api/manager/snapshot', { cache: 'no-store' }).then(r => r.json()),
      fetch('/utilization/api/manager/actions', { cache: 'no-store' }).then(r => r.json()),
    ]);
    const brief = snapRes.brief;
    const actions = actionsRes.actions || {};
    const proposals = actionsRes.proposals || {};
    const registry = actionsRes.registry || [];
    const userIdeas = actionsRes.user_ideas || [];

    // Render the pending-ideas indicator (processing or failed)
    renderPendingIdeas(userIdeas);

    const body = document.getElementById('mgr-body');
    const meta = document.getElementById('mgr-meta');
    const stale = document.getElementById('mgr-stale');
    if (!brief && !userIdeas.some(u => u.status === 'ok')) {
      body.innerHTML = '<em>No brief yet — click Refresh to ask the manager agent for a portfolio review, or submit an idea above.</em>';
      meta.textContent = '';
      stale.textContent = '';
      _scheduleMgrPoll(userIdeas.some(u => u.status === 'processing'));
      return;
    }
    body.innerHTML = await renderManagerBulletsWithActions(
      (brief && brief.content) || '', actions, proposals, registry, userIdeas,
    );
    if (brief) {
      meta.textContent =
        `via ${brief.provider_used || ''} (${brief.model_used || ''}) · ${fmtAge(brief.ts)} · ` +
        `${(brief.projects_in_bundle || []).length} projects · ${brief.bundle_chars || 0} chars in prompt`;
      const ageHrs = brief.ts ? (Date.now() - new Date(brief.ts).getTime()) / 3600000 : 999;
      stale.textContent = ageHrs > 6 ? 'STALE' : '';
    } else {
      meta.textContent = 'No portfolio refresh yet (showing only user-submitted ideas).';
      stale.textContent = '';
    }

    wireUpManagerActionButtons();
    wireUpDraftPocButtons();
    wireUpSubmitIdea();
    wireUpMinimize();
    wireUpModelSelector();
    wireUpBulletExpand();
    wireUpFleetHealthPill();
    wireUpBatchRefresh();
    wireUpShowPrompt();
    updateSessionCostFromActions(actions, proposals, userIdeas);

    // F11 — surface the "show prompt" button only when a brief is loaded.
    const showRow = document.getElementById('show-prompt-row');
    if (showRow) showRow.style.display = brief ? 'flex' : 'none';
    renderTabs();
    applyTabFilter();
    injectResultHeaders();
    applyCollapsedResults();
    applyMinimizedState();
    // Start (or restart) per-panel 1-second timers for any visible running rows
    activateRunningTimers(document.getElementById('manager-brief'));

    // Detect any running tasks for adaptive polling
    let hasRunning = false;
    for (const byAction of Object.values(actions)) {
      for (const row of Object.values(byAction)) {
        if (row && row.status === 'running') { hasRunning = true; break; }
      }
    }
    if (!hasRunning) {
      for (const byProj of Object.values(proposals)) {
        for (const row of Object.values(byProj)) {
          if (row && row.status === 'running') { hasRunning = true; break; }
        }
      }
    }
    if (!hasRunning) {
      hasRunning = userIdeas.some(u => u.status === 'processing');
    }
    _scheduleMgrPoll(hasRunning);
  } catch (e) {
    document.getElementById('mgr-body').innerHTML = '<em>fetch error: ' + escapeStr(e.message) + '</em>';
    _scheduleMgrPoll(false);
  }
}

function renderPendingIdeas(userIdeas) {
  const list = document.getElementById('idea-pending-list');
  if (!list) return;
  const interesting = (userIdeas || []).filter(u => u.status !== 'ok');
  list.innerHTML = '';
  for (const u of interesting) {
    const div = document.createElement('div');
    div.className = 'idea-pending' + (u.status === 'failed' ? ' failed' : '');
    if (u.status === 'processing') {
      div.innerHTML =
        '<strong>Manager processing…</strong> ' +
        `<span class="raw">${escapeStr((u.idea || '').slice(0, 200))}</span>`;
    } else if (u.status === 'failed') {
      div.innerHTML =
        '<strong style="color:var(--bad);">Failed:</strong> ' +
        escapeStr(u.error || 'unknown') +
        ` <span class="raw">(${escapeStr((u.idea || '').slice(0, 100))}…)</span>` +
        // Dismiss × — addresses the audit finding that a stale failure
        // banner had no exit and made the dashboard look broken.
        ` <button class="dismiss-idea" type="button"` +
        ` data-idea-id="${u.id}" title="Dismiss this failure (hides it from the brief; row stays in the DB for audit).">×</button>`;
    }
    list.appendChild(div);
  }
  // Wire up dismiss buttons
  list.querySelectorAll('button.dismiss-idea').forEach(btn => {
    if (btn.dataset.wired === '1') return;
    btn.dataset.wired = '1';
    btn.addEventListener('click', async () => {
      const id = btn.dataset.ideaId;
      btn.disabled = true;
      try {
        const r = await fetch(`/utilization/api/manager/user-ideas/${encodeURIComponent(id)}/dismiss`, { method: 'POST' });
        if (r.ok) {
          // Remove the parent row immediately; next poll will confirm.
          btn.closest('.idea-pending')?.remove();
        } else {
          const d = await r.json().catch(() => ({}));
          alert('Dismiss failed: ' + (d.error || r.status));
          btn.disabled = false;
        }
      } catch (e) {
        alert('Dismiss error: ' + (e.message || e));
        btn.disabled = false;
      }
    });
  });
}

function wireUpSubmitIdea() {
  const btn = document.getElementById('btn-submit-idea');
  const input = document.getElementById('idea-input');
  const hint = document.querySelector('.idea-box .hint');
  if (!btn || !input || btn.dataset.wired === '1') return;
  btn.dataset.wired = '1';

  // Live-disable the button while the textarea is empty so the affordance
  // matches the behavior. Persist the original hint text to restore later.
  const origHint = hint ? hint.textContent : '';
  const sync = () => {
    const empty = !(input.value || '').trim();
    btn.disabled = empty;
    btn.title = empty ? 'Enter an idea first' : '';
    if (hint && hint.classList.contains('warn') && !empty) {
      hint.classList.remove('warn');
      hint.textContent = origHint;
    }
  };
  input.addEventListener('input', sync);
  sync();

  btn.addEventListener('click', async () => {
    const idea = (input.value || '').trim();
    if (!idea) {
      // Visible feedback: shake the textarea + flip the hint to a warning.
      input.classList.remove('shake');
      void input.offsetWidth;            // restart the animation
      input.classList.add('shake');
      setTimeout(() => input.classList.remove('shake'), 350);
      if (hint) {
        hint.classList.add('warn');
        hint.textContent = 'Type an idea before submitting.';
      }
      input.focus();
      return;
    }
    btn.disabled = true;
    btn.classList.add('is-busy');
    const orig = btn.textContent;
    btn.textContent = 'Submitting…';
    const ideaBody = { idea };
    const ideaHint = getModelHint();
    if (ideaHint) ideaBody.model_hint = ideaHint;
    try {
      const r = await fetch('/utilization/api/manager/submit-idea', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(ideaBody),
      });
      const d = await r.json();
      if (!r.ok && !d.queued) {
        alert('Submission failed: ' + (d.error || r.status));
      } else {
        input.value = '';
        // Quick refresh to show the processing indicator; adaptive polling
        // takes over from there.
        await loadManagerBrief();
      }
    } catch (e) {
      alert('Submit error: ' + (e.message || e));
    } finally {
      btn.classList.remove('is-busy');
      btn.textContent = orig;
      sync();   // re-disable if textarea is now empty
    }
  });
}

function wireUpDraftPocButtons() {
  // Toggle the picker open/close
  document.querySelectorAll('.manager-brief button.draft-poc').forEach(btn => {
    if (btn.dataset.wired === '1') return;
    btn.dataset.wired = '1';
    btn.addEventListener('click', () => {
      const h = btn.dataset.bulletHash;
      const picker = document.querySelector(`.mgr-poc-picker[data-bullet-hash="${h}"]`);
      if (picker) picker.classList.toggle('expanded');
    });
  });

  // Project picks → POST draft-poc
  document.querySelectorAll('.mgr-poc-picker button.poc-pick').forEach(btn => {
    if (btn.dataset.wired === '1') return;
    btn.dataset.wired = '1';
    btn.addEventListener('click', async () => {
      const h = btn.dataset.bulletHash;
      const text = decodeURIComponent(btn.dataset.bulletText);
      const projectId = btn.dataset.projectId;
      const projectName = btn.dataset.projectName;
      btn.disabled = true;
      const orig = btn.textContent;
      btn.textContent = 'Queuing…';
      const slot = document.querySelector(`.mgr-action-result-slot[data-bullet-hash="${h}"]`);
      if (slot) {
        const placeholder = document.createElement('div');
        placeholder.className = 'mgr-poc-result running running-panel';
        placeholder.dataset.placeholderProject = projectId;
        placeholder.innerHTML = `
          <span class="mgr-poc-banner RUNNING">PoC · ${escapeStr(projectName)} · QUEUED</span>
          ${buildRunningHtml('draft-poc', new Date().toISOString(), `PoC for ${projectName}`)}
        `;
        slot.appendChild(placeholder);
        activateRunningTimers(placeholder);
      }
      const pocReqBody = { bullet_text: text };
      const pocHint = getModelHint();
      if (pocHint) pocReqBody.model_hint = pocHint;
      try {
        const r = await fetch(
          `/utilization/api/manager/bullets/${encodeURIComponent(h)}/draft-poc/${encodeURIComponent(projectId)}`,
          { method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(pocReqBody) }
        );
        const d = await r.json();
        if (!r.ok && !d.queued) {
          alert('Draft PoC failed: ' + (d.error || r.status));
          if (slot) {
            const ph = slot.querySelector(`[data-placeholder-project="${projectId}"]`);
            if (ph) ph.remove();
          }
        } else {
          // Trigger a quick refresh so the running row shows up; then
          // _scheduleMgrPoll picks up the rest.
          await loadManagerBrief();
          // Close the picker
          const picker = document.querySelector(`.mgr-poc-picker[data-bullet-hash="${h}"]`);
          if (picker) picker.classList.remove('expanded');
        }
      } catch (e) {
        alert('Draft PoC request failed: ' + (e.message || e));
      } finally {
        btn.disabled = false;
        btn.textContent = orig;
      }
    });
  });

  // Apply / Discard inside PoC results — reuse the per-project endpoints
  document.querySelectorAll('.mgr-poc-result button[data-action]').forEach(btn => {
    if (btn.dataset.wired === '1') return;
    btn.dataset.wired = '1';
    btn.addEventListener('click', async () => {
      const action = btn.dataset.action;
      const projectId = btn.dataset.projectId;
      const h = btn.dataset.bulletHash;
      btn.disabled = true;
      const orig = btn.textContent;
      btn.textContent = action === 'apply' ? 'Applying…' : 'Discarding…';
      try {
        const r = await fetch(
          `/utilization/api/projects/${encodeURIComponent(projectId)}/proposals/${encodeURIComponent(h)}/${action}`,
          { method: 'POST' }
        );
        const d = await r.json();
        if (!r.ok || d.error) {
          alert(d.error || 'failed');
          btn.disabled = false; btn.textContent = orig;
        } else {
          await loadManagerBrief();
        }
      } catch (e) {
        alert(e.message || e);
        btn.disabled = false; btn.textContent = orig;
      }
    });
  });
}

// Max-quota-low nudge: poll the utilization snapshot in parallel with the
// projects snapshot, and surface a banner when Claude Max session is near
// full OR when the weekly all-models bucket is past 90%. Encourages the
// user to flip the model selector to Haiku before they accidentally start
// dispatching expensive Opus calls against an empty Max session.
const _NUDGE_DISMISSED_KEY = 'utilization.quotaNudgeDismissed';
async function pollQuotaNudge() {
  const dismissed = sessionStorage.getItem(_NUDGE_DISMISSED_KEY) === '1';
  const nudge = document.getElementById('quota-nudge');
  if (!nudge) return;
  if (dismissed) {
    nudge.classList.remove('shown');
    return;
  }
  try {
    const r = await fetch('/utilization/api/snapshot', {cache:'no-store'});
    if (!r.ok) return;
    const d = await r.json();
    const c = d.claude || {};
    const sessionPct = c.session_pct;
    const weeklyPct = c.weekly_all_pct;
    const text = document.getElementById('quota-nudge-text');
    let triggered = false;
    let severe = false;
    let msg = '';
    if (sessionPct != null && sessionPct >= 95) {
      triggered = true; severe = true;
      msg = `Claude Max 5-hour session is ${sessionPct.toFixed(0)}% used (resets ${c.session_resets_in_text || 'soon'}). Until reset, every dispatch falls through to billable API.`;
    } else if (sessionPct != null && sessionPct >= 80) {
      triggered = true;
      msg = `Claude Max session at ${sessionPct.toFixed(0)}% — about to fall through to billable API. Resets ${c.session_resets_in_text || 'soon'}.`;
    } else if (weeklyPct != null && weeklyPct >= 90) {
      triggered = true; severe = true;
      msg = `Claude Max weekly all-models bucket is ${weeklyPct.toFixed(0)}% used (resets ${c.weekly_resets_at_text || 'next week'}). Even auto routing will burn API budget.`;
    } else if (weeklyPct != null && weeklyPct >= 80) {
      triggered = true;
      msg = `Claude Max weekly bucket at ${weeklyPct.toFixed(0)}% — close to threshold. Resets ${c.weekly_resets_at_text || 'next week'}.`;
    }
    if (triggered && text) {
      text.textContent = msg;
      nudge.classList.toggle('severe', severe);
      nudge.classList.add('shown');
    } else {
      nudge.classList.remove('shown');
    }
  } catch (e) { /* poll silently */ }
}
function wireUpQuotaNudge() {
  const nudge = document.getElementById('quota-nudge');
  if (!nudge || nudge.dataset.wired === '1') return;
  nudge.dataset.wired = '1';
  nudge.querySelector('button.switch-haiku')?.addEventListener('click', () => {
    const sel = document.getElementById('mgr-model');
    if (sel) {
      sel.value = 'claude-haiku-4-5-20251001';
      sel.dispatchEvent(new Event('change'));
    }
    nudge.classList.remove('shown');
  });
  nudge.querySelector('button.dismiss-nudge')?.addEventListener('click', () => {
    sessionStorage.setItem(_NUDGE_DISMISSED_KEY, '1');
    nudge.classList.remove('shown');
  });
}

// F11 — show-prompt: fetch the prompt that produced the current brief
// and reveal it in the collapsible footer pane. The prompt isn't included
// in the polled snapshot because it's large; we lazy-load on first click.
function wireUpShowPrompt() {
  const btn = document.getElementById('btn-show-prompt');
  const pane = document.getElementById('show-prompt-pane');
  const info = document.getElementById('show-prompt-info');
  const content = document.getElementById('show-prompt-content');
  const meta = document.getElementById('show-prompt-meta');
  if (!btn || btn.dataset.wired === '1') return;
  btn.dataset.wired = '1';
  btn.addEventListener('click', async () => {
    if (pane.classList.contains('expanded')) {
      pane.classList.remove('expanded');
      btn.textContent = 'Show prompt';
      return;
    }
    btn.disabled = true;
    btn.textContent = 'Loading…';
    try {
      const r = await fetch('/utilization/api/manager/snapshot?include_prompt=1', {cache:'no-store'});
      const d = await r.json();
      const prompt = d.brief && d.brief.prompt;
      if (!prompt) {
        info.textContent = 'No prompt stored for this brief — it was generated before the show-prompt feature was added (or by a different code path). Click Refresh to regenerate, then try again.';
        content.textContent = '';
      } else {
        const briefTs = (d.brief && d.brief.ts) || '';
        const provider = (d.brief && d.brief.provider_used) || '';
        const model = (d.brief && d.brief.model_used) || '';
        info.textContent = `Brief ts=${briefTs} · ${provider} (${model}) · ${prompt.length.toLocaleString()} chars`;
        content.textContent = prompt;
        if (meta) meta.textContent = `(${prompt.length.toLocaleString()} chars)`;
      }
      pane.classList.add('expanded');
      btn.textContent = 'Hide prompt';
    } catch (e) {
      alert('Failed to load prompt: ' + (e.message || e));
    } finally {
      btn.disabled = false;
    }
  });
}

// F4 — expand a collapsed bullet to show the rest of its detail.
function wireUpBulletExpand() {
  document.querySelectorAll('.mgr-bullet button.bullet-expand').forEach(btn => {
    if (btn.dataset.wired === '1') return;
    btn.dataset.wired = '1';
    btn.addEventListener('click', () => {
      const bullet = btn.closest('.mgr-bullet');
      if (!bullet) return;

}

// F6/F7 — clickable fleet-health pill: scroll to first card matching the
// clicked status tier and flash it. Wires to whatever pills are currently
// rendered by renderFleetHealth().
function wireUpFleetHealthPill() {
  document.querySelectorAll('.fleet-health .pill[data-target-status]').forEach(pill => {
    if (pill.dataset.wired === '1') return;
    pill.dataset.wired = '1';
    pill.addEventListener('click', () => {
      if (pill.classList.contains('zero')) return;
      const targetStatus = pill.dataset.targetStatus;
      const cards = [...document.querySelectorAll('.card')];

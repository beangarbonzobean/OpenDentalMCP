<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Projects</title>
<style>
:root {
  --bg: #0e1116;
  --panel: #161b22;
  --panel-border: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --accent: #2f81f7;
  --good: #2ea043;
  --warn: #d29922;
  --bad: #f85149;
  --neutral: #6e7681;
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--text);
  font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--panel-border);
  display: flex; align-items: baseline; gap: 16px;
}
header h1 { margin: 0; font-size: 16px; font-weight: 600; }
header nav a { color: var(--text-dim); text-decoration: none; font-size: 13px; margin-right: 14px; }
header nav a:hover { color: var(--text); }
header nav a.active { color: var(--text); border-bottom: 2px solid var(--accent); padding-bottom: 2px; }
header .updated { color: var(--text-dim); font-size: 12px; margin-left: auto; }

.domain {
  margin: 18px 14px 6px;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.manager-brief {
  margin: 14px 14px 8px;
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-left: 3px solid var(--accent);
  border-radius: 8px;
  padding: 16px 18px;
}
.manager-brief h2 {
  margin: 0 0 8px;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 8px;
}
.manager-brief .body {
  font-size: 13px;
  line-height: 1.55;
}
.manager-brief .body h3 {
  margin: 12px 0 4px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--text);
}
.manager-brief .body h3:first-child { margin-top: 0; }
.manager-brief .body ul { padding-left: 20px; margin: 4px 0; }
.manager-brief .body li { margin: 4px 0; }
.manager-brief .body strong { font-weight: 600; }
.manager-brief .mgr-bullet { display: flex; gap: 10px; align-items: flex-start; margin: 6px 0; }
.manager-brief .mgr-bullet-text { flex: 1; }
.manager-brief .mgr-bullet-actions { display: flex; gap: 4px; flex-shrink: 0; flex-wrap: nowrap; }
.manager-brief button.mgr-action {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  color: var(--text-dim);
  font: inherit;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 3px;
  cursor: pointer;
  white-space: nowrap;
}
.manager-brief button.mgr-action:hover { color: var(--text); border-color: var(--accent); }
.manager-brief button.mgr-action:disabled { opacity: 0.5; cursor: wait; }
.manager-brief button.mgr-action.has-result { color: var(--good); border-color: var(--good); }
.manager-brief button.mgr-action.draft-poc { color: var(--warn); border-color: var(--warn); }
.manager-brief button.mgr-action.draft-poc:hover { color: var(--bad); border-color: var(--bad); }
.mgr-poc-picker {
  display: none;
  flex-wrap: wrap;
  gap: 4px;
  margin: 8px 0 0 16px;
  padding: 8px 10px;
  background: var(--bg);
  border: 1px solid var(--panel-border);
  border-radius: 4px;
  font-size: 11px;
}
.mgr-poc-picker.expanded { display: flex; }
.mgr-poc-picker .label { color: var(--text-dim); margin-right: 4px; align-self: center; }
.mgr-poc-picker button {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  color: var(--text);
  font: inherit;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 3px;
  cursor: pointer;
}
.mgr-poc-picker button:hover { border-color: var(--accent); }
.mgr-poc-picker button:disabled { opacity: 0.5; cursor: wait; }
.mgr-poc-result {
  margin-top: 8px;
  margin-left: 16px;
  padding: 10px 12px;
  background: var(--bg);
  border-left: 3px solid var(--warn);
  border-radius: 0 6px 6px 0;
  font-size: 12px;
  line-height: 1.5;
}
.mgr-poc-result.applied { border-left-color: var(--good); }
.mgr-poc-result.discarded { border-left-color: var(--neutral); }
.mgr-poc-result.failed { border-left-color: var(--bad); }
.mgr-poc-result.running { border-left-color: var(--warn); }
.mgr-poc-result h3, .mgr-poc-result h4 {
  margin: 6px 0 4px;
  font-size: 11px; font-weight: 600;
  color: var(--text); text-transform: none; letter-spacing: 0;
}
.mgr-poc-result code { background: rgba(255,255,255,0.06); padding: 1px 4px; border-radius: 3px; font-size: 11px; }
.mgr-poc-result .files { display: flex; flex-wrap: wrap; gap: 4px 8px; margin: 4px 0; font-size: 11px; }
.mgr-poc-result .files code { background: rgba(255,255,255,0.06); }
.mgr-poc-result pre.diff {
  background: #0a0d12; border: 1px solid var(--panel-border);
  border-radius: 4px; padding: 8px 10px; margin: 6px 0;
  font: 11px/1.4 ui-monospace, monospace; color: var(--text-dim);
  max-height: 280px; overflow: auto; white-space: pre;
}
.mgr-poc-result .added { color: var(--good); }
.mgr-poc-result .removed { color: var(--bad); }
.mgr-poc-result .header { color: var(--accent); }
.mgr-poc-result .actions { display: flex; gap: 6px; margin-top: 8px; }
.mgr-poc-result button.apply { color: var(--good); border-color: var(--good); }
.mgr-poc-result button.discard { color: var(--bad); border-color: var(--bad); }
.mgr-poc-meta { font-size: 10px; color: var(--text-dim); margin-top: 6px; }
.mgr-poc-banner {
  font-size: 10px; padding: 1px 6px; border-radius: 3px;
  letter-spacing: 0.04em; margin-bottom: 6px; display: inline-block;
}
.mgr-poc-banner.PENDING  { background: rgba(210, 153, 34, 0.18); color: var(--warn); }
.mgr-poc-banner.APPLIED  { background: rgba(46, 160, 67, 0.18); color: var(--good); }
.mgr-poc-banner.DISCARDED{ background: rgba(110, 118, 129, 0.18); color: var(--neutral); }
.mgr-poc-banner.RUNNING  { background: rgba(210, 153, 34, 0.18); color: var(--warn); }
.mgr-poc-banner.FAILED   { background: rgba(248, 81, 73, 0.18); color: var(--bad); }
.mgr-action-output {
  margin-top: 8px;
  margin-left: 16px;
  padding: 10px 12px;
  background: var(--bg);
  border-left: 3px solid var(--accent);
  border-radius: 0 6px 6px 0;
  font-size: 12px;
  line-height: 1.5;
  display: none;
}
.mgr-action-output.expanded { display: block; }
.mgr-action-output.failed { border-left-color: var(--bad); }
.mgr-action-output.running { border-left-color: var(--warn); }
.mgr-action-output h3, .mgr-action-output h4 {
  margin: 6px 0 4px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text);
  text-transform: none; letter-spacing: 0;
}
.mgr-action-output ul { padding-left: 18px; margin: 2px 0 6px; }
.mgr-action-output li { margin: 2px 0; }
.mgr-action-output code {
  background: rgba(255,255,255,0.06);
  padding: 1px 4px; border-radius: 3px;
  font-size: 11px;
}
.mgr-action-meta { font-size: 10px; color: var(--text-dim); margin-top: 6px; }
.manager-brief .body code {
  background: rgba(255,255,255,0.06);
  padding: 1px 5px; border-radius: 3px;
  font-size: 12px;
}
.manager-brief .meta {
  margin-top: 10px;
  font-size: 10px;
  color: var(--text-dim);
}
.manager-brief button.refresh-mgr {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  color: var(--text-dim);
  font: inherit;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 3px;
  cursor: pointer;
}
.manager-brief button.refresh-mgr:hover { color: var(--text); border-color: var(--accent); }
.manager-brief button.refresh-mgr:disabled { opacity: 0.5; cursor: wait; }
.manager-brief .stale {
  display: inline-block;
  background: rgba(210, 153, 34, 0.18);
  color: var(--warn);
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 10px;
  margin-left: 6px;
  letter-spacing: 0.04em;
}
.idea-box {
  margin: 0 0 14px;
  padding: 10px 12px;
  background: var(--bg);
  border: 1px dashed var(--panel-border);
  border-radius: 6px;
}
.idea-box label {
  display: block;
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.idea-box textarea {
  width: 100%;
  min-height: 50px;
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 4px;
  color: var(--text);
  font: inherit;
  font-size: 13px;
  padding: 6px 8px;
  resize: vertical;
}
.idea-box textarea:focus { outline: none; border-color: var(--accent); }
.idea-box .row { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
.idea-box .hint { font-size: 11px; color: var(--text-dim); }
.idea-box button.submit-idea {
  background: var(--accent);
  color: white;
  border: none;
  font: inherit;
  font-size: 12px;
  padding: 5px 14px;
  border-radius: 4px;
  cursor: pointer;
}
.idea-box button.submit-idea:hover { background: #1f6feb; }
.idea-box button.submit-idea:disabled { opacity: 0.5; cursor: wait; }
.idea-pending {
  margin-top: 8px;
  padding: 8px 10px;
  background: var(--panel);
  border-left: 3px solid var(--warn);
  border-radius: 0 4px 4px 0;
  font-size: 12px;
}
.idea-pending.failed { border-left-color: var(--bad); }
.idea-pending .raw { color: var(--text-dim); font-style: italic; font-size: 11px; }
.user-idea-marker {
  display: inline-block;
  background: rgba(47, 129, 247, 0.15);
  color: var(--accent);
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 9px;
  letter-spacing: 0.04em;
  margin-right: 6px;
  text-transform: uppercase;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
  gap: 14px;
  padding: 0 14px 20px;
}
.card {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 8px;
  padding: 16px;
  display: flex; flex-direction: column;
}
.card.clickable { cursor: pointer; transition: border-color 0.15s; }
.card.clickable:hover { border-color: var(--accent); }
.card .open-link {
  align-self: flex-start;
  font-size: 11px;
  color: var(--accent);
  text-decoration: none;
  margin-top: 8px;
}
.card .open-link:hover { text-decoration: underline; }
.card h2 { margin: 0 0 4px; font-size: 14px; font-weight: 600;
  display: flex; align-items: center; gap: 8px; }
.card .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.card .desc { color: var(--text-dim); font-size: 12px; margin: 6px 0 10px; line-height: 1.45; }
.card .meta { display: grid; grid-template-columns: auto 1fr; gap: 4px 10px;
  font-size: 12px; color: var(--text-dim); }
.card .meta .v { color: var(--text); font-variant-numeric: tabular-nums; }
.card .next { margin-top: 12px; border-top: 1px solid var(--panel-border); padding-top: 10px; }
.card .next h3 {
  margin: 0 0 6px;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
  display: flex; justify-content: space-between; align-items: baseline;
}
.card .next-content { font-size: 13px; line-height: 1.5; }
.card .next-content ul { padding-left: 20px; margin: 4px 0; }
.card .next-content li { margin: 4px 0; }
.card .next-content em { color: var(--text-dim); font-style: normal; }

.status-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  display: inline-block;
}
.status-green   { background: var(--good); }
.status-yellow  { background: var(--warn); }
.status-red     { background: var(--bad); }
.status-unknown { background: var(--neutral); }

.tag {
  font-size: 10px; padding: 1px 6px; border-radius: 3px;
  background: rgba(255,255,255,0.06);
  color: var(--text-dim);
  text-transform: lowercase;
  letter-spacing: 0.04em;
}
.tag.phase { background: rgba(47, 129, 247, 0.12); color: var(--accent); }

button.refresh-ns {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  color: var(--text-dim);
  font: inherit;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 3px;
  cursor: pointer;
}
button.refresh-ns:hover { color: var(--text); border-color: var(--accent); }
button.refresh-ns:disabled { opacity: 0.5; cursor: wait; }
.next-meta { font-size: 10px; color: var(--text-dim); margin-top: 6px; }
.bullet-error { color: var(--bad); }
</style>
</head>

<body>
<header>
  <h1>Projects</h1>
  <nav>
    <a href="/utilization/">Utilization</a>
    <a href="/utilization/projects/" class="active">Projects</a>
  </nav>
  <span class="updated" id="updated">—</span>
</header>

<div class="manager-brief" id="manager-brief">
  <h2>
    <span>Manager's brief · portfolio view <span id="mgr-stale"></span></span>
    <button class="refresh-mgr" id="btn-refresh-mgr" type="button">Refresh</button>
  </h2>
  <div class="idea-box">
    <label for="idea-input">Submit an idea — manager will read context and add a bullet</label>
    <textarea id="idea-input" placeholder="e.g. We should integrate Modento into the intake auto-filing pipeline so manual review queues stay synced." maxlength="4000"></textarea>
    <div class="row">
      <span class="hint">Opus will fit it into the right section, citing relevant projects.</span>
      <button class="submit-idea" id="btn-submit-idea" type="button">Submit to manager</button>
    </div>
    <div id="idea-pending-list"></div>
  </div>
  <div class="body" id="mgr-body"><em>No brief yet — click Refresh.</em></div>
  <div class="meta" id="mgr-meta"></div>
</div>

<div id="domains"></div>

<script>
function escapeStr(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderInline(s) {
  let out = escapeStr(s);
  out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  out = out.replace(/`([^`]+)`/g, '<code>$1</code>');
  return out.replace(/\n/g, '<br>');
}

// Markdown renderer for the manager's brief — supports h3 headers + bullets.
function renderMarkdownRich(md) {
  if (!md) return '<em>Empty.</em>';
  const lines = md.split('\n');
  const out = [];
  let inList = false;
  const flushList = () => { if (inList) { out.push('</ul>'); inList = false; } };
  for (const raw of lines) {
    const ln = raw.trimEnd();
    let m;
    if ((m = ln.match(/^#{2,4}\s+(.+)$/))) {
      flushList();
      out.push(`<h3>${renderInline(m[1])}</h3>`);
    } else if (/^\s*[-*]\s+/.test(ln)) {
      if (!inList) { out.push('<ul>'); inList = true; }
      out.push('<li>' + renderInline(ln.replace(/^\s*[-*]\s+/, '')) + '</li>');
    } else if (ln.trim() === '') {
      flushList();
    } else {
      flushList();
      out.push('<div>' + renderInline(ln) + '</div>');
    }
  }
  flushList();
  return out.join('');
}

// Parse the manager brief into a structured form: array of
// {section: "Cross-project opportunities", bullets: [text, text, ...]}
function parseManagerBrief(md) {
  if (!md) return [];
  const sections = [];
  let current = null;
  let buf = '';
  const pushBuf = () => {
    if (buf.trim() && current) current.bullets.push(buf.trim());
    buf = '';
  };
  for (const raw of md.split('\n')) {
    const ln = raw.trimEnd();
    let m;
    if ((m = ln.match(/^#{2,4}\s+(.+)$/))) {
      pushBuf();
      current = { section: m[1].trim(), bullets: [] };
      sections.push(current);
    } else if (/^\s*[-*]\s+/.test(ln)) {
      pushBuf();
      buf = ln.replace(/^\s*[-*]\s+/, '');
    } else if (ln.trim() === '') {
      pushBuf();
    } else if (current) {
      buf += '\n' + ln;
    }
  }
  pushBuf();
  return sections;
}

async function bulletHashSha1(text) {
  const bytes = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest('SHA-1', bytes);
  return Array.from(new Uint8Array(hash))
    .map(b => b.toString(16).padStart(2, '0'))
    .join('').slice(0, 16);
}

function renderActionResult(action, row) {
  if (!row) return '';
  const klass = row.status === 'ok' ? '' :
                row.status === 'running' ? 'running' :
                row.status === 'failed' ? 'failed' : '';
  const body = row.status === 'running'
    ? '<em>Running…</em>'
    : row.status === 'failed'
      ? '<span style="color:var(--bad);">' + escapeStr(row.error || 'failed') + '</span>'
      : renderMarkdownRich(row.content || '');
  const meta = row.status === 'ok'
    ? `<div class="mgr-action-meta">${escapeStr(action)} · via ${escapeStr(row.provider_used || '')} (${escapeStr(row.model_used || '')}) · ${fmtAge(row.ts)}</div>`
    : '';
  return `<div class="mgr-action-output expanded ${klass}">${body}${meta}</div>`;
}

function renderDiff(diff) {
  if (!diff) return '';
  const lines = diff.split('\n').map(ln => {
    if (ln.startsWith('+++') || ln.startsWith('---') || ln.startsWith('diff '))
      return `<span class="header">${escapeStr(ln)}</span>`;
    if (ln.startsWith('+')) return `<span class="added">${escapeStr(ln)}</span>`;
    if (ln.startsWith('-')) return `<span class="removed">${escapeStr(ln)}</span>`;
    return escapeStr(ln);
  });
  return `<pre class="diff">${lines.join('\n')}</pre>`;
}

function renderPocResult(projectId, projectName, prop) {
  if (!prop) return '';
  const status = (prop.status || 'pending').toUpperCase();
  const klass = (prop.status || '').toLowerCase();
  let body = '';
  if (prop.status === 'running') {
    body = '<em>Drafting PoC (Sonnet, 1-3 min typical)…</em>';
  } else if (prop.status === 'failed') {
    body = `<span style="color:var(--bad);">${escapeStr(prop.error || 'failed')}</span>`;
  } else {
    body = renderMarkdownRich(prop.summary || '');
    if (prop.files_changed && prop.files_changed.length) {
      body += '<div class="files">' +
        prop.files_changed.map(f => '<code>' + escapeStr(f) + '</code>').join('') +
        '</div>';
    }
    body += renderDiff(prop.diff);
    if (prop.status === 'pending') {
      body += `<div class="actions">
        <button class="bullet-btn apply" data-action="apply"
                data-project-id="${escapeStr(projectId)}"
                data-bullet-hash="${escapeStr(prop.bullet_hash)}">Apply to main</button>
        <button class="bullet-btn discard" data-action="discard"
                data-project-id="${escapeStr(projectId)}"
                data-bullet-hash="${escapeStr(prop.bullet_hash)}">Discard</button>
      </div>`;
    }
  }
  return `
    <div class="mgr-poc-result ${klass}">
      <span class="mgr-poc-banner ${status}">PoC · ${escapeStr(projectName)} · ${status}</span>
      ${body}
      <div class="mgr-poc-meta">via ${escapeStr(prop.provider_used || '')} (${escapeStr(prop.model_used || '')}) · ${fmtAge(prop.ts)}</div>
    </div>
  `;
}

// Merge user-idea bullets (status='ok') into the parsed sections by name.
function foldUserIdeasIntoSections(sections, userIdeas) {
  const okIdeas = (userIdeas || []).filter(u => u.status === 'ok' && u.bullet);
  if (!okIdeas.length) return sections;
  const byName = new Map();
  for (const s of sections) byName.set(s.section, s);
  // Make sure all four canonical section headers exist in render order
  const canonical = ['Cross-project opportunities', 'Patterns', 'Strategic recommendations', 'User-submitted ideas'];
  const merged = [];
  for (const name of canonical) {
    if (byName.has(name)) merged.push(byName.get(name));
    else merged.push({ section: name, bullets: [] });
  }
  // Append any unexpected sections from the original brief (e.g. Opus invented one)
  for (const s of sections) {
    if (!canonical.includes(s.section)) merged.push(s);
  }
  // Distribute user ideas into matching sections
  for (const u of okIdeas) {
    const target = merged.find(s => s.section === (u.section || 'User-submitted ideas'))
                || merged.find(s => s.section === 'User-submitted ideas');
    if (target) {
      target.bullets.push({ text: u.bullet, _userIdea: u });
    }
  }
  return merged;
}

async function renderManagerBulletsWithActions(briefContent, actions, proposalsByBullet, registry, userIdeas) {
  let sections = parseManagerBrief(briefContent);
  if (!sections.length && (!userIdeas || !userIdeas.some(u => u.status === 'ok'))) {
    return renderMarkdownRich(briefContent);
  }
  // Convert string bullets to {text} objects so we can mark user ideas
  sections = sections.map(s => ({
    section: s.section,
    bullets: s.bullets.map(b => typeof b === 'string' ? { text: b } : b),
  }));
  sections = foldUserIdeasIntoSections(sections, userIdeas);

  const blocks = [];
  for (const s of sections) {
    if (!s.bullets.length) continue;
    blocks.push(`<h3>${renderInline(s.section)}</h3>`);
    for (const bulletObj of s.bullets) {
      const text = bulletObj.text;
      const isUserIdea = !!bulletObj._userIdea;
      const h = await bulletHashSha1(text);
      const planRow = (actions[h] || {}).plan;
      const investigateRow = (actions[h] || {}).investigate;
      const planClass = planRow && planRow.status === 'ok' ? 'has-result' : '';
      const invClass = investigateRow && investigateRow.status === 'ok' ? 'has-result' : '';
      const props = proposalsByBullet[h] || {};
      const hasPoc = Object.keys(props).length > 0;
      const pocClass = hasPoc ? 'has-result' : '';

      // Build the per-project picker buttons
      const pickerButtons = (registry || []).map(p =>
        `<button class="poc-pick"
                 data-project-id="${escapeStr(p.id)}"
                 data-project-name="${escapeStr(p.name)}"
                 data-bullet-hash="${escapeStr(h)}"
                 data-bullet-text="${encodeURIComponent(text)}">${escapeStr(p.name)}</button>`
      ).join('');

      // Render existing PoC results for this bullet
      const pocResults = Object.entries(props).map(([pid, prop]) => {
        const proj = (registry || []).find(p => p.id === pid);
        const projName = proj ? proj.name : pid;
        return renderPocResult(pid, projName, prop);
      }).join('');

      const ideaTag = isUserIdea
        ? '<span class="user-idea-marker">your idea</span>'
        : '';
      blocks.push(`
        <div class="mgr-bullet">
          <div class="mgr-bullet-text">${ideaTag}${renderInline(text)}</div>
          <div class="mgr-bullet-actions">
            <button class="mgr-action plan ${planClass}"
                    data-bullet-hash="${escapeStr(h)}"
                    data-bullet-text="${encodeURIComponent(text)}"
                    data-section="${escapeStr(s.section)}">Plan it</button>
            <button class="mgr-action investigate ${invClass}"
                    data-bullet-hash="${escapeStr(h)}"
                    data-bullet-text="${encodeURIComponent(text)}"
                    data-section="${escapeStr(s.section)}">Investigate</button>
            <button class="mgr-action draft-poc ${pocClass}"
                    data-bullet-hash="${escapeStr(h)}">Draft PoC ▾</button>
          </div>
        </div>
        <div class="mgr-poc-picker" data-bullet-hash="${escapeStr(h)}">
          <span class="label">Pick a project:</span>
          ${pickerButtons}
        </div>
        <div class="mgr-action-result-slot" data-bullet-hash="${escapeStr(h)}">
          ${renderActionResult('plan', planRow)}
          ${renderActionResult('investigate', investigateRow)}
          ${pocResults}
        </div>
      `);
    }
  }
  return blocks.join('\n');
}

function fmtAge(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return '—';
  const ago = (Date.now() - d.getTime()) / 1000;
  if (ago < 60) return Math.round(ago) + 's ago';
  if (ago < 3600) return Math.round(ago / 60) + 'm ago';
  if (ago < 86400) return Math.round(ago / 3600) + 'h ago';
  return Math.round(ago / 86400) + 'd ago';
}

function statusClass(level) {
  return 'status-' + (level || 'unknown');
}

// Tiny markdown renderer — bullet list + simple inline. We only ask Claude
// for bullets, so this is enough; we fall back to raw text for anything else.
function renderMarkdown(md) {
  if (!md) return '<em>No recommendations yet — click Refresh.</em>';
  const lines = md.trim().split('\n');
  const out = [];
  let inList = false;
  for (const raw of lines) {
    const ln = raw.trimEnd();
    if (/^\s*[-*]\s+/.test(ln)) {
      if (!inList) { out.push('<ul>'); inList = true; }
      out.push('<li>' + escape(ln.replace(/^\s*[-*]\s+/, '')) + '</li>');
    } else if (ln.trim() === '') {
      if (inList) { out.push('</ul>'); inList = false; }
    } else {
      if (inList) { out.push('</ul>'); inList = false; }
      out.push('<div>' + escape(ln) + '</div>');
    }
  }
  if (inList) out.push('</ul>');
  return out.join('');
}
function escape(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function bundleSummaryLine(b) {
  if (!b) return '';
  const parts = [];
  if (b.repo_files_included && b.repo_files_included.length)
    parts.push(b.repo_files_included.length + ' repo file(s)');
  if (b.memory_files_included && b.memory_files_included.length)
    parts.push(b.memory_files_included.length + ' memory note(s)');
  if (b.git_commits_included)
    parts.push(b.git_commits_included + ' commit(s)');
  if (b.log_lines_included)
    parts.push(b.log_lines_included + ' log line(s)');
  return parts.join(' · ');
}

function buildCard(p) {
  const card = document.createElement('div');
  card.className = 'card clickable';
  card.dataset.projectId = p.id;
  card.addEventListener('click', (e) => {
    // Don't navigate if the click was on a button or link inside the card.
    if (e.target.closest('button, a')) return;
    window.location.href = '/utilization/projects/' + encodeURIComponent(p.id) + '/';
  });

  const reason = p.overall_reason ? p.overall_reason : '';

  const lastCommit = p.health && p.health.last_commit_age_days != null
    ? p.health.last_commit_age_days.toFixed(1) + 'd'
    : '—';
  const logAge = p.health && p.health.log_age_hours != null
    ? p.health.log_age_hours.toFixed(1) + 'h'
    : '—';

  card.innerHTML = `
    <h2>
      <span class="status-dot ${statusClass(p.overall)}"></span>
      ${escape(p.name)}
      <span class="tag phase">${escape(p.phase || '')}</span>
    </h2>
    <div class="row" style="font-size:12px;color:var(--text-dim);">
      ${escape(reason)}
    </div>
    <div class="desc">${escape(p.description || '')}</div>
    <div class="meta">
      <div>service</div>           <div class="v">${escape((p.health && p.health.service) || '—')} ${escape((p.health && p.health.service_status) || '')}</div>
      <div>last commit</div>       <div class="v">${lastCommit}${p.health && p.health.last_commit_subject ? ' — ' + escape(p.health.last_commit_subject) : ''}</div>
      <div>log freshness</div>     <div class="v">${logAge}</div>
      <div>repo path</div>         <div class="v">${escape(p.repo_path)}</div>
    </div>
    <div class="next">
      <h3>
        <span>Next steps</span>
        <button class="refresh-ns" data-project-id="${escape(p.id)}">Refresh</button>
      </h3>
      <div class="next-content" id="ns-${escape(p.id)}">${renderMarkdown(p.next_steps && p.next_steps.content)}</div>
      <div class="next-meta" id="ns-meta-${escape(p.id)}">
        ${p.next_steps && p.next_steps.ts
          ? `generated ${fmtAge(p.next_steps.ts)} via ${escape(p.next_steps.provider_used || '')} (${escape(p.next_steps.model_used || '')}); ${bundleSummaryLine(p.next_steps.bundle_summary)}`
          : ''}
      </div>
      <a class="open-link" href="/utilization/projects/${encodeURIComponent(p.id)}/">Open detail view →</a>
    </div>
  `;

  card.querySelector('button.refresh-ns').addEventListener('click', async (e) => {
    const btn = e.currentTarget;
    btn.disabled = true; const orig = btn.textContent;
    btn.textContent = 'Generating…';
    const target = document.getElementById('ns-' + p.id);
    target.innerHTML = '<em>Asking Claude (this can take 30-60s)…</em>';
    try {
      const r = await fetch(`/utilization/api/projects/${encodeURIComponent(p.id)}/refresh-next-steps`,
                            { method: 'POST' });
      const d = await r.json();
      if (!r.ok || d.error) {
        target.innerHTML = `<div class="bullet-error">${escape(d.error || 'failed')}</div>`;
      } else {
        target.innerHTML = renderMarkdown(d.content);
        document.getElementById('ns-meta-' + p.id).textContent =
          `generated just now via ${d.provider || ''} (${d.model || ''}); ${bundleSummaryLine(d.bundle_summary)}`;
      }
    } catch (err) {
      target.innerHTML = `<div class="bullet-error">${escape(err.message || err)}</div>`;
    } finally {
      btn.textContent = orig; btn.disabled = false;
    }
  });

  return card;
}

async function refresh() {
  try {
    const r = await fetch('/utilization/api/projects/snapshot', { cache: 'no-store' });
    if (!r.ok) throw new Error('snapshot ' + r.status);
    const d = await r.json();
    const root = document.getElementById('domains');
    root.innerHTML = '';

    // Group by domain, preserving order of first appearance
    const byDomain = new Map();
    for (const p of d.projects || []) {
      const k = p.domain || '';
      if (!byDomain.has(k)) byDomain.set(k, []);
      byDomain.get(k).push(p);
    }

    for (const [domain, projs] of byDomain) {
      const h = document.createElement('div');
      h.className = 'domain';
      h.textContent = domain || '(uncategorized)';
      root.appendChild(h);
      const grid = document.createElement('div');
      grid.className = 'grid';
      for (const p of projs) grid.appendChild(buildCard(p));
      root.appendChild(grid);
    }

    document.getElementById('updated').textContent =
      'updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('updated').textContent = 'fetch error: ' + e.message;
  }
}

// Manager's brief — render existing + wire up refresh + adaptive polling
let _mgrPollTimer = null;
function _scheduleMgrPoll(hasRunning) {
  if (_mgrPollTimer) clearTimeout(_mgrPollTimer);
  // Faster poll while any task is in flight, slower otherwise
  const ms = hasRunning ? 4000 : 60000;
  _mgrPollTimer = setTimeout(loadManagerBrief, ms);
}

async function loadManagerBrief() {
  try {
    const [snapRes, actionsRes] = await Promise.all([
      fetch('/utilization/api/manager/snapshot', { cache: 'no-store' }).then(r => r.json()),
      fetch('/utilization/api/manager/actions', { cache: 'no-store' }).then(r => r.json()),
    ]);
    const brief = snapRes.brief;
    const actions = actionsRes.actions || {};
    const proposals = actionsRes.proposals || {};
    const registry = actionsRes.registry || [];
    const userIdeas = actionsRes.user_ideas || [];

    // Render the pending-ideas indicator (processing or failed)
    renderPendingIdeas(userIdeas);

    const body = document.getElementById('mgr-body');
    const meta = document.getElementById('mgr-meta');
    const stale = document.getElementById('mgr-stale');
    if (!brief && !userIdeas.some(u => u.status === 'ok')) {
      body.innerHTML = '<em>No brief yet — click Refresh to ask the manager agent for a portfolio review, or submit an idea above.</em>';
      meta.textContent = '';
      stale.textContent = '';
      _scheduleMgrPoll(userIdeas.some(u => u.status === 'processing'));
      return;
    }
    body.innerHTML = await renderManagerBulletsWithActions(
      (brief && brief.content) || '', actions, proposals, registry, userIdeas,
    );
    if (brief) {
      meta.textContent =
        `via ${brief.provider_used || ''} (${brief.model_used || ''}) · ${fmtAge(brief.ts)} · ` +
        `${(brief.projects_in_bundle || []).length} projects · ${brief.bundle_chars || 0} chars in prompt`;
      const ageHrs = brief.ts ? (Date.now() - new Date(brief.ts).getTime()) / 3600000 : 999;
      stale.textContent = ageHrs > 6 ? 'STALE' : '';
    } else {
      meta.textContent = 'No portfolio refresh yet (showing only user-submitted ideas).';
      stale.textContent = '';
    }

    wireUpManagerActionButtons();
    wireUpDraftPocButtons();
    wireUpSubmitIdea();

    // Detect any running tasks for adaptive polling
    let hasRunning = false;
    for (const byAction of Object.values(actions)) {
      for (const row of Object.values(byAction)) {
        if (row && row.status === 'running') { hasRunning = true; break; }
      }
    }
    if (!hasRunning) {
      for (const byProj of Object.values(proposals)) {
        for (const row of Object.values(byProj)) {
          if (row && row.status === 'running') { hasRunning = true; break; }
        }
      }
    }
    if (!hasRunning) {
      hasRunning = userIdeas.some(u => u.status === 'processing');
    }
    _scheduleMgrPoll(hasRunning);
  } catch (e) {
    document.getElementById('mgr-body').innerHTML = '<em>fetch error: ' + escapeStr(e.message) + '</em>';
    _scheduleMgrPoll(false);
  }
}

function renderPendingIdeas(userIdeas) {
  const list = document.getElementById('idea-pending-list');
  if (!list) return;
  const interesting = (userIdeas || []).filter(u => u.status !== 'ok');
  list.innerHTML = '';
  for (const u of interesting) {
    const div = document.createElement('div');
    div.className = 'idea-pending' + (u.status === 'failed' ? ' failed' : '');
    if (u.status === 'processing') {
      div.innerHTML =
        '<strong>Manager processing…</strong> ' +
        `<span class="raw">${escapeStr((u.idea || '').slice(0, 200))}</span>`;
    } else if (u.status === 'failed') {
      div.innerHTML =
        '<strong style="color:var(--bad);">Failed:</strong> ' +
        escapeStr(u.error || 'unknown') +
        ` <span class="raw">(${escapeStr((u.idea || '').slice(0, 100))}…)</span>`;
    }
    list.appendChild(div);
  }
}

function wireUpSubmitIdea() {
  const btn = document.getElementById('btn-submit-idea');
  const input = document.getElementById('idea-input');
  if (!btn || !input || btn.dataset.wired === '1') return;
  btn.dataset.wired = '1';
  btn.addEventListener('click', async () => {
    const idea = (input.value || '').trim();
    if (!idea) {
      input.focus();
      return;
    }
    btn.disabled = true;
    const orig = btn.textContent;
    btn.textContent = 'Submitting…';
    try {
      const r = await fetch('/utilization/api/manager/submit-idea', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idea }),
      });
      const d = await r.json();
      if (!r.ok && !d.queued) {
        alert('Submission failed: ' + (d.error || r.status));
      } else {
        input.value = '';
        // Quick refresh to show the processing indicator; adaptive polling
        // takes over from there.
        await loadManagerBrief();
      }
    } catch (e) {
      alert('Submit error: ' + (e.message || e));
    } finally {
      btn.disabled = false;
      btn.textContent = orig;
    }
  });
}

function wireUpDraftPocButtons() {
  // Toggle the picker open/close
  document.querySelectorAll('.manager-brief button.draft-poc').forEach(btn => {
    if (btn.dataset.wired === '1') return;
    btn.dataset.wired = '1';
    btn.addEventListener('click', () => {
      const h = btn.dataset.bulletHash;
      const picker = document.querySelector(`.mgr-poc-picker[data-bullet-hash="${h}"]`);
      if (picker) picker.classList.toggle('expanded');
    });
  });

  // Project picks → POST draft-poc
  document.querySelectorAll('.mgr-poc-picker button.poc-pick').forEach(btn => {
    if (btn.dataset.wired === '1') return;
    btn.dataset.wired = '1';
    btn.addEventListener('click', async () => {
      const h = btn.dataset.bulletHash;
      const text = decodeURIComponent(btn.dataset.bulletText);
      const projectId = btn.dataset.projectId;
      const projectName = btn.dataset.projectName;
      btn.disabled = true;
      const orig = btn.textContent;
      btn.textContent = 'Queuing…';
      const slot = document.querySelector(`.mgr-action-result-slot[data-bullet-hash="${h}"]`);
      if (slot) {
        const placeholder = document.createElement('div');
        placeholder.className = 'mgr-poc-result running';
        placeholder.dataset.placeholderProject = projectId;
        placeholder.innerHTML = `
          <span class="mgr-poc-banner RUNNING">PoC · ${escapeStr(projectName)} · QUEUED</span>
          <em>Worktree being created, agent dispatching…</em>
        `;
        slot.appendChild(placeholder);
      }
      try {
        const r = await fetch(
          `/utilization/api/manager/bullets/${encodeURIComponent(h)}/draft-poc/${encodeURIComponent(projectId)}`,
          { method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ bullet_text: text }) }
        );
        const d = await r.json();
        if (!r.ok && !d.queued) {
          alert('Draft PoC failed: ' + (d.error || r.status));
          if (slot) {
            const ph = slot.querySelector(`[data-placeholder-project="${projectId}"]`);
            if (ph) ph.remove();
          }
        } else {
          // Trigger a quick refresh so the running row shows up; then
          // _scheduleMgrPoll picks up the rest.
          await loadManagerBrief();
          // Close the picker
          const picker = document.querySelector(`.mgr-poc-picker[data-bullet-hash="${h}"]`);
          if (picker) picker.classList.remove('expanded');
        }
      } catch (e) {
        alert('Draft PoC request failed: ' + (e.message || e));
      } finally {
        btn.disabled = false;
        btn.textContent = orig;
      }
    });
  });

  // Apply / Discard inside PoC results — reuse the per-project endpoints
  document.querySelectorAll('.mgr-poc-result button[data-action]').forEach(btn => {
    if (btn.dataset.wired === '1') return;
    btn.dataset.wired = '1';
    btn.addEventListener('click', async () => {
      const action = btn.dataset.action;
      const projectId = btn.dataset.projectId;
      const h = btn.dataset.bulletHash;
      btn.disabled = true;
      const orig = btn.textContent;
      btn.textContent = action === 'apply' ? 'Applying…' : 'Discarding…';
      try {
        const r = await fetch(
          `/utilization/api/projects/${encodeURIComponent(projectId)}/proposals/${encodeURIComponent(h)}/${action}`,
          { method: 'POST' }
        );
        const d = await r.json();
        if (!r.ok || d.error) {
          alert(d.error || 'failed');
          btn.disabled = false; btn.textContent = orig;
        } else {
          await loadManagerBrief();
        }
      } catch (e) {
        alert(e.message || e);
        btn.disabled = false; btn.textContent = orig;
      }
    });
  });
}

function wireUpManagerActionButtons() {
  document.querySelectorAll('.manager-brief button.mgr-action').forEach(btn => {
    if (btn.dataset.wired === '1') return;
    btn.dataset.wired = '1';
    btn.addEventListener('click', async () => {
      const action = btn.classList.contains('plan') ? 'plan' : 'investigate';
      const h = btn.dataset.bulletHash;
      const text = decodeURIComponent(btn.dataset.bulletText);
      const section = btn.dataset.section || '';
      // Find the result slot for this bullet, append a running placeholder
      const slot = document.querySelector(`.mgr-action-result-slot[data-bullet-hash="${h}"]`);
      const allBtns = document.querySelectorAll(`.manager-brief button.mgr-action[data-bullet-hash="${h}"]`);
      allBtns.forEach(b => b.disabled = true);
      const original = btn.textContent;
      btn.textContent = action === 'plan' ? 'Planning…' : 'Investigating…';
      // Render a transient running state
      if (slot) {
        // Remove any prior output for this action
        slot.querySelectorAll('.mgr-action-output').forEach(el => {
          if (el.dataset.action === action) el.remove();
        });
        const placeholder = document.createElement('div');
        placeholder.className = 'mgr-action-output expanded running';
        placeholder.dataset.action = action;
        placeholder.innerHTML = `<em>${action === 'plan' ? 'Drafting an implementation plan' : 'Validating evidence'} (Sonnet, 30–90s typical)…</em>`;
        slot.appendChild(placeholder);
      }
      try {
        const res = await fetch(
          `/utilization/api/manager/bullets/${encodeURIComponent(h)}/${action}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ bullet_text: text, section }),
          }
        );
        const d = await res.json();
        if (slot) {
          slot.querySelectorAll('.mgr-action-output').forEach(el => {
            if (el.dataset.action === action) el.remove();
          });
          const out = document.createElement('div');
          out.dataset.action = action;
          if (!res.ok || d.error) {
            out.className = 'mgr-action-output expanded failed';
            out.innerHTML = '<span style="color:var(--bad);">' + escapeStr(d.error || 'failed') + '</span>';
          } else {
            out.className = 'mgr-action-output expanded';
            out.innerHTML = renderMarkdownRich(d.content || '') +
              `<div class="mgr-action-meta">${escapeStr(action)} · via ${escapeStr(d.provider || '')} (${escapeStr(d.model || '')}) · just now</div>`;
            btn.classList.add('has-result');
          }
          slot.appendChild(out);
        }
      } catch (e) {
        if (slot) {
          const out = document.createElement('div');
          out.className = 'mgr-action-output expanded failed';
          out.dataset.action = action;
          out.innerHTML = '<span style="color:var(--bad);">' + escapeStr(e.message || e) + '</span>';
          slot.appendChild(out);
        }
      } finally {
        allBtns.forEach(b => b.disabled = false);
        btn.textContent = original;
      }
    });
  });
}

const mgrBtn = document.getElementById('btn-refresh-mgr');
if (mgrBtn) {
  mgrBtn.addEventListener('click', async () => {
    mgrBtn.disabled = true;
    const orig = mgrBtn.textContent;
    mgrBtn.textContent = 'Asking Sonnet…';
    document.getElementById('mgr-body').innerHTML = '<em>Manager agent reviewing all 6 projects (60–120s typical)…</em>';
    try {
      const r = await fetch('/utilization/api/manager/refresh', { method: 'POST' });
      const d = await r.json();
      if (!r.ok || d.error) {
        document.getElementById('mgr-body').innerHTML = '<em style="color:var(--bad);">' + escapeStr(d.error || 'failed') + '</em>';
      } else {
        await loadManagerBrief();
      }
    } catch (e) {
      document.getElementById('mgr-body').innerHTML = '<em style="color:var(--bad);">' + escapeStr(e.message || e) + '</em>';
    } finally {
      mgrBtn.disabled = false;
      mgrBtn.textContent = orig;
    }
  });
}

loadManagerBrief();
refresh();
setInterval(refresh, 30000);
// loadManagerBrief schedules its own next call adaptively (4s while
// tasks running, 60s otherwise) — see _scheduleMgrPoll.
</script>
</body>

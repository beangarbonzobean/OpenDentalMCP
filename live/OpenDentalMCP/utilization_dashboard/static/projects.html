// F8 — batch refresh of stale next-steps for every project card with
// either no next-steps content or a content older than 24h. Fans out
// parallel POSTs to /api/projects/<id>/refresh-next-steps.
function wireUpBatchRefresh() {
  const btn = document.querySelector('button.refresh-stale');
  if (!btn || btn.dataset.wired === '1') return;
  btn.dataset.wired = '1';
  btn.addEventListener('click', async () => {
    const cards = [...document.querySelectorAll('.card[data-project-id]')];
    const stale = cards.filter(c => {
      const nsContent = c.querySelector('.next-content');
      if (!nsContent) return false;
      const txt = nsContent.textContent || '';
      if (txt.includes('No recommendations yet')) return true;
      const meta = c.querySelector('.next-meta')?.textContent || '';
      return /\d+\s*(d|h)\s*ago/.test(meta) && /([2-9]\d|1\d\d)\s*h\s*ago|\d+\s*d\s*ago/.test(meta);
    });
    if (!stale.length) {
      alert('Nothing stale — all next-steps are fresh.');
      return;
    }
    if (!confirm(`Refresh next-steps for ${stale.length} project(s)? Each is one Sonnet call (~$0.02 each on API; free if Claude Max has capacity).`)) return;
    btn.disabled = true;
    const orig = btn.textContent;
    btn.textContent = `Refreshing ${stale.length}…`;
    try {
      await Promise.all(stale.map(c => {
        const id = c.dataset.projectId;
        const ns = c.querySelector('.next-content');
        if (ns) ns.innerHTML = '<em>Asking Claude…</em>';
        return fetch(`/utilization/api/projects/${encodeURIComponent(id)}/refresh-next-steps`,
                     { method: 'POST' }).then(r => r.json()).then(d => ({id, d}))
          .catch(e => ({id, d: {error: e.message}}));
      }));
    } finally {
      btn.disabled = false;
      btn.textContent = orig;
      // Force a snapshot poll so the UI shows fresh content
      refresh();
    }
  });
}

function wireUpManagerActionButtons() {
  document.querySelectorAll('.manager-brief button.mgr-action').forEach(btn => {
    if (btn.dataset.wired === '1') return;
    // .draft-poc is wired separately by wireUpDraftPocButtons — it opens the
    // project picker rather than dispatching an action directly.
    if (btn.classList.contains('draft-poc')) return;
    btn.dataset.wired = '1';
    btn.addEventListener('click', async () => {
      const action = btn.classList.contains('plan') ? 'plan' : 'investigate';
      const h = btn.dataset.bulletHash;
      const text = decodeURIComponent(btn.dataset.bulletText);
      const section = btn.dataset.section || '';
      // Find the result slot for this bullet, append a running placeholder
      const slot = document.querySelector(`.mgr-action-result-slot[data-bullet-hash="${h}"]`);
      const allBtns = document.querySelectorAll(`.manager-brief button.mgr-action[data-bullet-hash="${h}"]`);
      allBtns.forEach(b => b.disabled = true);
      const original = btn.textContent;
      btn.textContent = action === 'plan' ? 'Planning…' : 'Investigating…';
      // Render a transient running state with spinner + live timer
      if (slot) {
        slot.querySelectorAll('.mgr-action-output').forEach(el => {
          if (el.dataset.action === action) el.remove();
        });
        const placeholder = document.createElement('div');
        placeholder.className = 'mgr-action-output expanded running running-panel';
        placeholder.dataset.action = action;
        const label = action === 'plan' ? 'Plan' : 'Investigate';
        placeholder.innerHTML = buildRunningHtml(action, new Date().toISOString(), `${label} in progress`);
        slot.appendChild(placeholder);
        activateRunningTimers(placeholder);
      }
      try {
        const reqBody = { bullet_text: text, section };
        const hint = getModelHint();
        if (hint) reqBody.model_hint = hint;
        const res = await fetch(
          `/utilization/api/manager/bullets/${encodeURIComponent(h)}/${action}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(reqBody),
          }
        );
        const d = await res.json();
        if (slot) {
          slot.querySelectorAll('.mgr-action-output').forEach(el => {
            if (el.dataset.action === action) el.remove();
          });
          const out = document.createElement('div');
          out.dataset.action = action;
          if (!res.ok || d.error) {
            out.className = 'mgr-action-output expanded failed';
            out.innerHTML = '<span style="color:var(--bad);">' + escapeStr(d.error || 'failed') + '</span>';
          } else {
            out.className = 'mgr-action-output expanded';
            out.innerHTML = renderMarkdownRich(d.content || '') +
              `<div class="mgr-action-meta">${escapeStr(action)} · via ${escapeStr(d.provider || '')} (${escapeStr(d.model || '')}) · just now</div>`;
            btn.classList.add('has-result');
          }
          slot.appendChild(out);
        }
      } catch (e) {
        if (slot) {
          const out = document.createElement('div');
          out.className = 'mgr-action-output expanded failed';
          out.dataset.action = action;
          out.innerHTML = '<span style="color:var(--bad);">' + escapeStr(e.message || e) + '</span>';
          slot.appendChild(out);
        }
      } finally {
        allBtns.forEach(b => b.disabled = false);
        btn.textContent = original;
      }
    });
  });
}

function showRefreshError(msg) {
  // Surface a refresh failure inline above the brief without clobbering the
  // existing bullets — the cached brief is still useful even when a re-run
  // fails (e.g. inference provider down).
  let banner = document.getElementById('mgr-refresh-error');
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'mgr-refresh-error';
    banner.className = 'idea-pending failed';
    banner.style.margin = '0 0 10px';
    const body = document.getElementById('mgr-body');
    body.parentNode.insertBefore(banner, body);
  }
  banner.innerHTML =
    '<strong style="color:var(--bad);">Refresh failed:</strong> ' + escapeStr(msg);
}
function clearRefreshError() {
  const banner = document.getElementById('mgr-refresh-error');
  if (banner) banner.remove();
}

const mgrBtn = document.getElementById('btn-refresh-mgr');
if (mgrBtn) {
  mgrBtn.addEventListener('click', async () => {
    mgrBtn.disabled = true;
    const orig = mgrBtn.textContent;
    mgrBtn.textContent = 'Asking Sonnet…';
    clearRefreshError();
    const refreshBody = {};
    const refreshHint = getModelHint();
    if (refreshHint) refreshBody.model_hint = refreshHint;
    try {
      const r = await fetch('/utilization/api/manager/refresh', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(refreshBody),
      });
      const d = await r.json();
      if (!r.ok || d.error) {
        showRefreshError(d.error || ('HTTP ' + r.status));
      } else {
        await loadManagerBrief();
      }
    } catch (e) {
      showRefreshError(e.message || String(e));
    } finally {
      mgrBtn.disabled = false;
      mgrBtn.textContent = orig;
      // Always update the header timestamp so the user sees the attempt
      // happened even when the refresh itself failed.
      const upd = document.getElementById('updated');
      if (upd) upd.textContent = 'updated ' + new Date().toLocaleTimeString();
    }
  });
}

loadManagerBrief();
refresh();
setInterval(refresh, 30000);
wireUpQuotaNudge();
pollQuotaNudge();
setInterval(pollQuotaNudge, 60000);  // every minute is plenty for quota state
// loadManagerBrief schedules its own next call adaptively (4s while
// tasks running, 60s otherwise) — see _scheduleMgrPoll.
</script>
</main>

# Project portfolio registry — drives the /utilization/projects/ view.
#
# Each entry describes one project: identity, where it lives on disk, what
# "running" means for it, and where to pull notes from when generating
# "next steps" via the inference router.
#
# Add / remove freely. The dashboard reads this on every request.

projects:

  - id: opendental_mcp
    name: OpenDental MCP
    domain: OpenDental
    phase: deployed
    description: |
      Main MCP server for the Open Dental REST API. Hosts the intake / OCR /
      np-tracker / chart-audit / utilization Flask blueprints. Nightly OCR
      rebuild and intake auto-filing run from here.
    repo_path: live/OpenDentalMCP
    health:
      service: OpenDentalMCPServer
      log_path: live/OpenDentalMCP/mcp_server_http.log
      log_stale_after_hours: 6
    notes_sources:
      - repo:README.md
      - repo:HANDOFF_image_ocr_mcp_tool.md
      - memory:project_opendental_mcp_infra
      - memory:project_opendental_code_patterns
      - memory:project_opendental_task_api
      - memory:project_intake_shadow_mode
      - memory:project_inference_router

  - id: dexis_monitor
    name: DEXISMonitor
    domain: DEXIS
    phase: deployed
    description: |
      DEXIS image-monitor MCP — exposes patient x-ray queries to AI agents,
      watches DEXIS_DATA SQL Server, surfaces recent x-rays + statistics.
    repo_path: live/DEXISMonitor
    health:
      service: DEXISMCPHTTPServer
      log_path: live/DEXISMonitor/mcp_server_http.log
      log_stale_after_hours: 24
    notes_sources:
      - repo:README.md

  - id: knowledge_mcp
    name: KnowledgeMCP
    domain: Knowledge
    phase: deployed
    description: |
      Knowledge-base MCP — indexes practice docs / memories and serves them
      to AI agents as a search/retrieval surface.
    repo_path: live/KnowledgeMCP
    health:
      service: KnowledgeMCPServer
      log_path: live/KnowledgeMCP/mcp_server_http.log
      log_stale_after_hours: 24
    notes_sources:
      - repo:README.md

  - id: windows_admin_mcp
    name: WindowsAdminMCP
    domain: Operations
    phase: deployed
    description: |
      Windows admin tooling MCP — fleet-deployable, exposes services / sshd /
      firewall / share / processes / SMB tools to AI agents. Used to operate
      the rest of the fleet.
    repo_path: live/WindowsAdminMCP
    health:
      service: WindowsAdminMCPServer
      log_path: live/WindowsAdminMCP/mcp_server_http.log
      log_stale_after_hours: 24
    notes_sources:
      - repo:README.md
      - repo:FLEET_DEPLOY.md

  - id: service_admin
    name: Service Admin
    domain: Operations
    phase: deployed
    description: |
      Service control + patient-recovery scripts. Embedded under the
      OpenDentalMCP venv. Recovers PatNum-keyed records when the OD Update
      lock corrupts state.
    repo_path: live/service_admin
    health:
      # No NSSM service of its own — runs as a Python process when invoked.
      # Treat as "manual" for now; add a process check later if useful.
      service: null
      log_path: live/service_admin/admin_stdout.log
      log_stale_after_hours: 720   # rarely run, don't alarm
    notes_sources:
      - repo:README.md

  - id: miyo_calibration
    name: MiYO Calibration
    domain: Lab
    phase: deployed
    description: |
      Calibration HTTP server for the MiYO ceramist team — port 8765, NSSM,
      tailscale-only. Lead user: Kalie Peace (per memory). Used daily by the
      lab for shade reproducibility.
    repo_path: live/MiYOCalibration
    health:
      service: MiYOCalibrationServer
      log_path: live/MiYOCalibration/mcp_server_http.log
      log_stale_after_hours: 24
    notes_sources:
      - repo:README.md
      - repo:AUDIT_AND_DISPATCH.md
      - repo:MODULE_SPLIT_PLAN.md
      - memory:project_miyo_calibration
      - memory:project_miyo_team

  - id: auto_ship_verifier
    name: Auto-ship Verifier
    domain: Dashboard
    phase: in_progress
    description: |
      Adaptive pre-merge test harness for L3 auto-apply. Runs against the
      proposal worktree before the merge fires; tier is picked from the
      diff (docs / Python / service / UI / schema). Currently:
        V1_SMOKE   secret regex + balanced markdown fences      (shipped)
        V2_UNIT    py_compile + ruff (E,F) + nearby pytest -x   (shipped)
        V3_SERVICE V2 + real-import + spawn-and-probe on free   (shipped)
                   port (opt-in via verify.v3_smoke)
        V4_UI      Playwright render + console-error scan       (TODO)
        V5_SCHEMA  always block, force manual review            (shipped)
      Verdict gates the existing HIGH-confidence check — both must agree
      before apply_to_main runs. Evidence stored in proposal_verification
      and rendered as a pill below each bullet on this page.
    repo_path: live/OpenDentalMCP/utilization_dashboard
    health:
      service: null  # runs in-process inside the dashboard
      log_path: live/OpenDentalMCP/utilization_dashboard/mcp_server_http.log
      log_stale_after_hours: 24
    notes_sources:
      - repo:verifier.py
      - repo:routes.py
      - repo:projects_storage.py
      - repo:static/project_detail.html
    verify:
      # V3 service-smoke: spawn the dashboard standalone runner inside the
      # proposal worktree on a free port, wait for /healthz to return 200,
      # hit a couple of read-only endpoints, then kill the subprocess.
      # Catches import/registration bugs that py_compile + ruff don't.
      v3_smoke:
        cwd: live/OpenDentalMCP
        command: ["python", "-m", "utilization_dashboard.standalone",
                  "--host", "127.0.0.1", "--port", "{port}"]
        ready_path: /utilization/healthz
        ready_timeout_s: 8
        probes:
          - /utilization/healthz
          - /utilization/api/projects/snapshot

  - id: chart_audit_backlog
    name: Chart Audit Backlog Burndown
    domain: OpenDental
    phase: in_progress
    description: |
      Burning down the 879-task chart-audit backlog (missing clinical notes,
      missing perio charts, unknown exam doctor). Two-track plan:
        Phase A — auto-resolve unknown_exam_doc tasks where appt+billed
                  providers agree on a known doctor (~125 of 159 mechanical).
                  Script: scripts/auto_resolve_unknown_exam_doc.py.
        Phase B — self-improving drafter for missing_note (currently 49/353
                  drafted). Pilot batch ~15-20 across template families,
                  feedback loop in dashboard (toggle implicit-edit-diff vs
                  thumbs+comment), templates for hygiene/exam, Claude SDK
                  few-shot for restorative/surgical (D2740/D2393/D7210/...).
        Phase C — perio-from-route-slip extractor for the 367 missing_perio
                  pile (not started).
      Lives inside the OpenDentalMCP service; no separate process.
    repo_path: live/OpenDentalMCP
    health:
      service: null
      log_path: live/OpenDentalMCP/mcp_server_http.log
      log_stale_after_hours: 24
    notes_sources:
      - repo:chart_audit_backlog/README.md
      - repo:chart_audit_backlog/auto_resolve_unknown_exam_doc.py
      - repo:chart_audit_backlog/select_pilot_batch.py
      - repo:chart_audit_routes.py
      - repo:scripts/draft_pending_notes.py
      - repo:scripts/nightly_draft_pending_notes.ps1
